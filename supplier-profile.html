  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var UI = window.FurnostylesVendorProfileUI, VR = window.FurnostylesVendorRenderer, VRec = window.FurnostylesVendorRecommendations;
        var hContainer = document.getElementById('vndHeader'), mContainer = document.getElementById('vndMain'), rContainer = document.getElementById('vndRecs');
        if (!UI || !VR) return;
        UI.renderLoading(mContainer);
        var id = UI.getParam('id');
        if (!id) { UI.renderNotFound(mContainer, 'supplier'); return; }
        var b = window.FurnostylesFirebaseBridge;
        if (!b) { UI.renderError(mContainer, 'Firebase bridge not available.'); return; }

        // Fetch supplier user details from 'users' collection, then query approved sourcing / material imports
        b.get('users', id)
          .then(function (userDoc) {
            // Verify roles matches supplier or admin acting as supplier partner
            if (!userDoc || (userDoc.role !== 'supplier' && userDoc.role !== 'vendor' && userDoc.role !== 'admin')) {
              UI.renderNotFound(mContainer, 'supplier');
              return;
            }
            // Fetch this supplier's approved material & sourcing listings
            b.list('listings', {
              where: [
                { field: 'vendorId', operator: '==', value: id },
                { field: 'status', operator: '==', value: 'approved' }
              ]
            }).then(function (listings) {
              VR.renderSupplierProfile(hContainer, mContainer, userDoc, listings);
              if (VRec) VRec.loadForSupplier(rContainer, id);
            }).catch(function (err) {
              UI.renderError(mContainer, err.message);
            });
          })
          .catch(function (err) {
            UI.renderError(mContainer, err.message);
          });
      });
    }());
  </script>
