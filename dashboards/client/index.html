<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../shared/dashboard-layout.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
      <section class="content-section">
        <div class="fns-dashboard-container">
          <div class="fns-dashboard-header">
            <div>
              <h2 class="fns-dashboard-title">Client Dashboard</h2>
              <div class="fns-dashboard-user-info">
                Role: <strong>Client</strong> &nbsp;|&nbsp; Email: <strong id="userEmail">Loading...</strong>
              </div>
            </div>
            <button id="logoutBtn" class="btn secondary">Sign Out</button>
          </div>

          <!-- Metrics Section -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Overview</h3>
            <div class="fns-metrics-grid" id="metricsGrid">
              <!-- Metrics rendered by JS -->
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Quick Actions</h3>
            <div id="quickActions"></div>
          </div>

          <!-- Inquiries Section -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Recent Inquiries</h3>
            <div id="inquiryList"></div>
          </div>

          <!-- Recent Activity -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Recent Activity</h3>
            <div id="activityList"></div>
          </div>

          <!-- Recommended Services -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Recommended Services</h3>
            <div id="servicesList"></div>
          </div>
        </div>
      </section>
    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="../../shared/auth/auth-config.js"></script>
  <script src="../../shared/auth/auth-state.js"></script>
  <script src="../../shared/auth/auth-ui.js"></script>
  <script src="../../shared/auth/role-router.js"></script>
  <script src="../../shared/auth/auth-guards.js"></script>
  <script src="../../shared/auth/user-profile-service.js"></script>

  <!-- Dashboard Shared -->
  <script src="../shared/dashboard-data.js"></script>
  <script src="../shared/dashboard-components.js"></script>
  <script src="../shared/dashboard-actions.js"></script>

  <!-- Footer Render -->
  <script defer src="../../shared/layout/footer-data.js"></script>
  <script defer src="../../shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var logoutBtn = document.getElementById('logoutBtn');
      var userEmailEl = document.getElementById('userEmail');
      var metricsGrid = document.getElementById('metricsGrid');
      var quickActions = document.getElementById('quickActions');
      var inquiryList = document.getElementById('inquiryList');
      var activityList = document.getElementById('activityList');
      var servicesList = document.getElementById('servicesList');

      /* Auth guard: require authentication and verify role */
      function checkAuthAndRole() {
        // Get user from localStorage
        var userKey = window.FurnostylesStorageKeys ? window.FurnostylesStorageKeys.LOCAL_USER : 'fns_local_user';
        var userSession = localStorage.getItem(userKey);
        
        if (!userSession) {
          window.location.href = '../../login.html?redirect=dashboards/client/index.html';
          return false;
        }

        try {
          var user = JSON.parse(userSession);
          
          // Verify user has client role
          if (user.role !== 'client' && user.role !== 'individual-seller' && user.role !== 'individual-landlord') {
            // Redirect to appropriate dashboard based on role
            var redirectMap = {
              'vendor': '../../dashboards/vendor/index.html',
              'provider': '../../dashboards/provider/index.html',
              'admin': '../../dashboards/admin/index.html',
              'property-owner': '../../dashboards/property-owner/index.html'
            };
            var redirectUrl = redirectMap[user.role] || '../../index.html';
            window.location.href = redirectUrl;
            return false;
          }

          return user;
        } catch (e) {
          console.error('Failed to parse user session:', e);
          window.location.href = '../../login.html?redirect=dashboards/client/index.html';
          return false;
        }
      }

      var currentUser = checkAuthAndRole();
      if (!currentUser) return;

      /* Load user info */
      function loadUserInfo() {
        if (window.FurnostylesAuthState) {
          var user = window.FurnostylesAuthState.getCurrentUser();
          if (user) {
            userEmailEl.textContent = user.email || 'Unknown';
          }
        }
      }

      /* Render dashboard content */
      function renderDashboard() {
        if (!window.FurnostylesDashboardData || !window.FurnostylesDashboardComponents) {
          console.warn('[ClientDashboard] Dashboard data or components not available.');
          return;
        }

        /* Render metrics */
        var metrics = window.FurnostylesDashboardData.getClientMetrics();
        var metricsData = [
          { label: 'Saved Items', value: metrics.savedItems, icon: '??' },
          { label: 'Quote Requests', value: metrics.quoteRequests, icon: '??' },
          { label: 'Sourcing Requests', value: metrics.sourcingRequests, icon: '??' },
          { label: 'Repair Requests', value: metrics.repairRequests, icon: '??' },
          { label: 'Project Consultations', value: metrics.projectConsultations, icon: '??' },
          { label: 'Pending Actions', value: metrics.pendingActions, icon: '?' }
        ];

        metricsData.forEach(function (metric) {
          var card = document.createElement('div');
          metricsGrid.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });

        /* Render quick actions */
        var actionsData = [
          { label: 'Request Quote', icon: '??', onClick: function () { window.FurnostylesDashboardActions.createNewInquiry('quote'); } },
          { label: 'Source Item', icon: '??', onClick: function () { window.FurnostylesDashboardActions.createNewInquiry('sourcing'); } },
          { label: 'Request Repair', icon: '??', onClick: function () { window.FurnostylesDashboardActions.createNewInquiry('repair'); } },
          { label: 'Consultation', icon: '??', onClick: function () { window.FurnostylesDashboardActions.createNewInquiry('consultation'); } }
        ];
        window.FurnostylesDashboardComponents.renderQuickActions(quickActions, actionsData);

        /* Render inquiries */
        var inquiries = window.FurnostylesDashboardData.getClientInquiries();
        window.FurnostylesDashboardComponents.renderInquiryList(inquiryList, inquiries);

        /* Render activity */
        var activity = window.FurnostylesDashboardData.getClientActivity();
        window.FurnostylesDashboardComponents.renderInquiryList(activityList, activity.map(function (act) {
          return {
            type: act.action,
            title: act.description,
            status: 'completed',
            date: act.timestamp
          };
        }));

        /* Render recommended services */
        var services = window.FurnostylesDashboardData.getRecommendedServices();
        window.FurnostylesDashboardComponents.renderInquiryList(servicesList, services.map(function (srv) {
          return {
            type: 'service',
            title: srv.title,
            status: 'available',
            date: srv.price,
            vendor: srv.provider + ' ? ' + srv.rating
          };
        }));
      }

      /* Logout handler */
      logoutBtn.addEventListener('click', function () {
        if (window.FurnostylesAuthState) {
          window.FurnostylesAuthState.signOut()
            .then(function () {
              window.location.href = '../../login.html';
            })
            .catch(function (error) {
              alert('Sign out failed: ' + error.message);
            });
        }
      });

      /* Initialize dashboard on page load */
      function initDashboard() {
        // Show loading state
        metricsGrid.innerHTML = '<div class="loading-spinner">Loading dashboard...</div>';
        quickActions.innerHTML = '<div class="loading-spinner">Loading...</div>';
        inquiryList.innerHTML = '<div class="loading-spinner">Loading...</div>';
        activityList.innerHTML = '<div class="loading-spinner">Loading...</div>';
        servicesList.innerHTML = '<div class="loading-spinner">Loading...</div>';

        loadUserInfo();
        renderDashboard();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
      } else {
        initDashboard();
      }

    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="../shared/firebase/firebase-config.js"></script>
  <script src="../shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="../shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="../assets/js/firestore.js" defer></script>
  <script src="../assets/js/session.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
    <!-- Auth Guard -->
  <script src="../assets/js/auth-guard.js" data-required-role="client"></script>
</body>
</html>
