<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Owner Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../shared/dashboard-layout.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
      <section class="content-section">
        <div class="fns-dashboard-container">
          <div class="fns-dashboard-header">
            <div>
              <h2 class="fns-dashboard-title">Property Owner Dashboard</h2>
              <div class="fns-dashboard-user-info">
                Role: <strong>Property Owner</strong> &nbsp;|&nbsp; Email: <strong id="userEmail">Loading...</strong>
              </div>
            </div>
            <button id="logoutBtn" class="btn secondary">Sign Out</button>
          </div>

          <!-- Property Overview Metrics -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Property Overview</h3>
            <div class="fns-metrics-grid" id="metricsGrid">
              <!-- Metrics rendered by JS -->
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Quick Actions</h3>
            <div id="quickActions"></div>
          </div>

          <!-- Listed Properties -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Listed Properties</h3>
            <div id="propertyList"></div>
          </div>

          <!-- Property Inquiries -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Property Inquiries</h3>
            <div id="inquiryList"></div>
          </div>

          <!-- Performance Summary -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Performance Summary</h3>
            <div id="performanceList"></div>
          </div>
        </div>
      </section>
    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="../../shared/auth/auth-config.js"></script>
  <script src="../../shared/auth/auth-state.js"></script>
  <script src="../../shared/auth/auth-ui.js"></script>
  <script src="../../shared/auth/role-router.js"></script>
  <script src="../../shared/auth/auth-guards.js"></script>
  <script src="../../shared/auth/user-profile-service.js"></script>

  <!-- Dashboard Shared -->
  <script src="../shared/dashboard-data.js"></script>
  <script src="../shared/dashboard-components.js"></script>
  <script src="../shared/dashboard-actions.js"></script>

  <!-- Footer Render -->
  <script defer src="../../shared/layout/footer-data.js"></script>
  <script defer src="../../shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var logoutBtn = document.getElementById('logoutBtn');
      var userEmailEl = document.getElementById('userEmail');
      var metricsGrid = document.getElementById('metricsGrid');
      var quickActions = document.getElementById('quickActions');
      var propertyList = document.getElementById('propertyList');
      var inquiryList = document.getElementById('inquiryList');
      var performanceList = document.getElementById('performanceList');

      /* Auth guard: require authentication */
      if (window.FurnostylesAuthGuards) {
        window.FurnostylesAuthGuards.requireAuth();
      }

      /* Load user info */
      function loadUserInfo() {
        if (window.FurnostylesAuthState) {
          var user = window.FurnostylesAuthState.getCurrentUser();
          if (user) {
            userEmailEl.textContent = user.email || 'Unknown';
          }
        }
      }

      /* Render dashboard content */
      function renderDashboard() {
        if (!window.FurnostylesDashboardData || !window.FurnostylesDashboardComponents) {
          console.warn('[PropertyOwnerDashboard] Dashboard data or components not available.');
          return;
        }

        /* Render metrics */
        var metrics = window.FurnostylesDashboardData.getPropertyOwnerMetrics();
        var metricsData = [
          { label: 'Total Properties', value: metrics.totalProperties, icon: '??' },
          { label: 'Listed Properties', value: metrics.listedProperties, icon: '??' },
          { label: 'Rental Inquiries', value: metrics.rentalInquiries, icon: '??' },
          { label: 'Sales Inquiries', value: metrics.salesInquiries, icon: '??' },
          { label: 'Maintenance Requests', value: metrics.maintenanceRequests, icon: '??' },
          { label: 'Total Revenue', value: metrics.totalRevenue, icon: '??' },
          { label: 'Avg Rating', value: metrics.averageRating + ' ?', icon: '?' },
          { label: 'Verification', value: metrics.verificationStatus, icon: '??' }
        ];

        metricsData.forEach(function (metric) {
          var card = document.createElement('div');
          metricsGrid.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });

        /* Render quick actions */
        var actionsData = [
          { label: 'Add Property', icon: '?', onClick: function () { console.log('Add property - coming soon'); } },
          { label: 'Request Maintenance', icon: '??', onClick: function () { console.log('Request maintenance - coming soon'); } },
          { label: 'Request Upgrade', icon: '???', onClick: function () { console.log('Request upgrade - coming soon'); } },
          { label: 'View Inquiries', icon: '??', onClick: function () { console.log('View inquiries - coming soon'); } }
        ];
        window.FurnostylesDashboardComponents.renderQuickActions(quickActions, actionsData);

        /* Render listed properties */
        var properties = window.FurnostylesDashboardData.getPropertyOwnerProperties();
        if (properties.length === 0) {
          window.FurnostylesDashboardComponents.renderEmptyState(propertyList, {
            title: 'No properties yet',
            message: 'Start by adding your first property listing.',
            icon: '??'
          });
        } else {
          window.FurnostylesDashboardComponents.renderInquiryList(propertyList, properties.map(function (prop) {
            return {
              type: prop.type,
              title: prop.title,
              status: prop.status,
              date: prop.price,
              vendor: prop.location + ' • ' + prop.views + ' views'
            };
          }));
        }

        /* Render property inquiries */
        var inquiries = window.FurnostylesDashboardData.getPropertyOwnerInquiries();
        if (inquiries.length === 0) {
          window.FurnostylesDashboardComponents.renderEmptyState(inquiryList, {
            title: 'No inquiries yet',
            message: 'Property inquiries will appear here.',
            icon: '??'
          });
        } else {
          window.FurnostylesDashboardComponents.renderInquiryList(inquiryList, inquiries.map(function (inq) {
            return {
              type: inq.type,
              title: inq.inquirer + ' - ' + inq.property,
              status: inq.status,
              date: inq.date,
              vendor: inq.message
            };
          }));
        }

        /* Render performance summary */
        var performance = window.FurnostylesDashboardData.getPropertyOwnerPerformance();
        var performanceData = [
          { label: 'Response Rate', value: performance.responseRate, icon: '??' },
          { label: 'Avg Response Time', value: performance.averageResponseTime, icon: '??' },
          { label: 'Occupancy Rate', value: performance.occupancyRate, icon: '??' },
          { label: 'Tenant Satisfaction', value: performance.tenantSatisfaction + ' ?', icon: '?' },
          { label: 'Maintenance Response', value: performance.maintenanceResponseTime, icon: '??' },
          { label: 'Revenue Growth', value: performance.revenueGrowth, icon: '??' }
        ];

        performanceData.forEach(function (metric) {
          var card = document.createElement('div');
          performanceList.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });
      }

      /* Logout handler */
      logoutBtn.addEventListener('click', function () {
        if (window.FurnostylesAuthState) {
          window.FurnostylesAuthState.signOut()
            .then(function () {
              window.location.href = '../../login.html';
            })
            .catch(function (error) {
              alert('Sign out failed: ' + error.message);
            });
        }
      });

      /* Initialize dashboard on page load */
      function initDashboard() {
        loadUserInfo();
        renderDashboard();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
      } else {
        initDashboard();
      }

    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="../shared/firebase/firebase-config.js"></script>
  <script src="../shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="../shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="../assets/js/firestore.js" defer></script>
  <script src="../assets/js/session.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
    <!-- Auth Guard -->
  <script src="../assets/js/auth-guard.js" data-required-role="property-owner"></script>
</body>
</html>
