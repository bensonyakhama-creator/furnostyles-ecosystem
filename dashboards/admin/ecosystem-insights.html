<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecosystem Intelligence Insights | Furnostyles Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../../shared/analytics/analytics-layout.css">
  
</head>
<body>

  <div class="premium-topbar">
    <span><strong>Furnostyles Admin</strong> Executive Console</span>
    <span><b>Secure Session</b></span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="../../index.html">
      <span>Furnostyles Intelligence</span>
    </a>
    <div style="font-weight:700;color:#c9a227;font-size:13px;">??? Insights Supervise Desk</div>
  </header>

  <div class="premium-layout">
    <main class="premium-main" style="padding:32px; max-width: 900px; margin: 0 auto;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <div>
          <h1 style="font-size:24px;font-weight:900;color:#1a2540;margin:0 0 4px;">Operational Bottlenecks &amp; Opportunities</h1>
          <p style="font-size:13px;color:#8090a0;margin:0;">Evaluate auto-generated platform interventions to balance marketplace supplies.</p>
        </div>
      </div>
      
      <div id="insightsContainer">
        <div style="padding:40px;text-align:center;color:#8090a0;">Evaluating operational signals...</div>
      </div>

    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/analytics/analytics-ui.js"></script>
  <script src="../../shared/analytics/ecosystem-insights.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var b = window.FurnostylesFirebaseBridge;
        var ui = window.FurnostylesAnalyticsUI;
        var insSvc = window.FurnostylesEcosystemInsights;

        if (!b || !insSvc) return;

        // Force generate and fetch
        insSvc.generateInsights(b).then(function () {
          b.list('ecosystemInsights').then(function (list) {
            var container = document.getElementById('insightsContainer');
            if (list.length === 0) {
              container.innerHTML = '<div style="text-align:center;padding:48px;border:1.5px dashed #dce4f0;border-radius:12px;color:#8090a0;font-size:13px;">' +
                'No operational bottleneck signals currently. Systems are nominal.</div>';
              return;
            }

            container.innerHTML = list.map(function (ins) {
              return ui ? ui.renderInsightRow(ins) : '';
            }).join('');
          });
        });
      });
    }());
  </script>
</body>
</html>
