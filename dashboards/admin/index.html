<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../shared/dashboard-layout.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
      <section class="content-section">
        <div class="fns-dashboard-container">
          <div class="fns-dashboard-header">
            <div>
              <h2 class="fns-dashboard-title">Admin Dashboard</h2>
              <div class="fns-dashboard-user-info">
                Role: <strong>Admin</strong> &nbsp;|&nbsp; Email: <strong id="userEmail">Loading...</strong>
              </div>
            </div>
            <button id="logoutBtn" class="btn secondary">Sign Out</button>
          </div>

          <!-- Admin Overview Metrics -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">System Overview</h3>
            <div class="fns-metrics-grid" id="metricsGrid">
              <!-- Metrics rendered by JS -->
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Quick Actions</h3>
            <div id="quickActions"></div>
          </div>

          <!-- Recent Activities -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Recent Activities</h3>
            <div id="activityList"></div>
          </div>
        </div>
      </section>
    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="../../shared/auth/auth-config.js"></script>
  <script src="../../shared/auth/auth-state.js"></script>
  <script src="../../shared/auth/auth-ui.js"></script>
  <script src="../../shared/auth/role-router.js"></script>
  <script src="../../shared/auth/auth-guards.js"></script>
  <script src="../../shared/auth/user-profile-service.js"></script>

  <!-- Dashboard Shared -->
  <script src="../shared/dashboard-data.js"></script>
  <script src="../shared/dashboard-components.js"></script>
  <script src="../shared/dashboard-actions.js"></script>

  <!-- Footer Render -->
  <script defer src="../../shared/layout/footer-data.js"></script>
  <script defer src="../../shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var logoutBtn = document.getElementById('logoutBtn');
      var userEmailEl = document.getElementById('userEmail');
      var metricsGrid = document.getElementById('metricsGrid');
      var quickActions = document.getElementById('quickActions');
      var activityList = document.getElementById('activityList');

      /* Auth guard: require authentication */
      if (window.FurnostylesAuthGuards) {
        window.FurnostylesAuthGuards.requireAuth();
      }

      /* Load user info */
      function loadUserInfo() {
        if (window.FurnostylesAuthState) {
          var user = window.FurnostylesAuthState.getCurrentUser();
          if (user) {
            userEmailEl.textContent = user.email || 'Unknown';
          }
        }
      }

      /* Render dashboard content */
      function renderDashboard() {
        if (!window.FurnostylesDashboardData || !window.FurnostylesDashboardComponents) {
          console.warn('[AdminDashboard] Dashboard data or components not available.');
          return;
        }

        /* Render metrics */
        var metrics = window.FurnostylesDashboardData.getAdminMetrics();
        var metricsData = [
          { label: 'Total Users', value: metrics.totalUsers, icon: '👥' },
          { label: 'Active Users', value: metrics.activeUsers, icon: '✅' },
          { label: 'Pending Verifications', value: metrics.pendingVerifications, icon: '📋' },
          { label: 'Total Vendors', value: metrics.totalVendors, icon: '🏪' },
          { label: 'Total Providers', value: metrics.totalProviders, icon: '🔧' },
          { label: 'Total Contractors', value: metrics.totalContractors, icon: '🏗️' },
          { label: 'Total Property Owners', value: metrics.totalPropertyOwners, icon: '🏠' },
          { label: 'Total Agents', value: metrics.totalAgents, icon: '🤝' },
          { label: 'System Status', value: metrics.systemStatus, icon: '🟢' }
        ];

        metricsData.forEach(function (metric) {
          var card = document.createElement('div');
          metricsGrid.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });

        /* Render quick actions */
        var actionsData = [
          { label: 'View Verifications', icon: '📋', onClick: function () { console.log('View verifications - coming soon'); } },
          { label: 'Manage Users', icon: '👥', onClick: function () { console.log('Manage users - coming soon'); } },
          { label: 'System Reports', icon: '📊', onClick: function () { console.log('System reports - coming soon'); } },
          { label: 'Settings', icon: '⚙️', onClick: function () { console.log('Settings - coming soon'); } }
        ];
        window.FurnostylesDashboardComponents.renderQuickActions(quickActions, actionsData);

        /* Render recent activities */
        var activities = window.FurnostylesDashboardData.getAdminActivities();
        if (activities.length === 0) {
          window.FurnostylesDashboardComponents.renderEmptyState(activityList, {
            title: 'No recent activities',
            message: 'System activities will appear here.',
            icon: '📊'
          });
        } else {
          window.FurnostylesDashboardComponents.renderInquiryList(activityList, activities.map(function (act) {
            return {
              type: act.type,
              title: act.user + ' - ' + act.action,
              status: act.status,
              date: act.date,
              vendor: ''
            };
          }));
        }
      }

      /* Logout handler */
      logoutBtn.addEventListener('click', function () {
        if (window.FurnostylesAuthState) {
          window.FurnostylesAuthState.signOut()
            .then(function () {
              window.location.href = '../../login.html';
            })
            .catch(function (error) {
              alert('Sign out failed: ' + error.message);
            });
        }
      });

      /* Initialize dashboard on page load */
      function initDashboard() {
        loadUserInfo();
        renderDashboard();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
      } else {
        initDashboard();
      }

    }());
  </script>
</body>
</html>
