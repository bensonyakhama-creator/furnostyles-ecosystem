<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecosystem Notifications Desk | Furnostyles Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../../shared/communication/communication-layout.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div class="premium-topbar">
    <span><strong>Furnostyles Admin</strong> Executive Console</span>
    <span><b>Secure Session</b></span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="../../index.html">
      <span>Furnostyles Coordinating Authority</span>
    </a>
    <div style="font-weight:700;color:#c9a227;font-size:13px;">??? Broadcast Authority</div>
  </header>

  <div class="premium-layout">
    <main class="premium-main" style="padding:32px; max-width: 800px; margin: 0 auto;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <div>
          <h1 style="font-size:24px;font-weight:900;color:#1a2540;margin:0 0 4px;">Platform Global Notifications</h1>
          <p style="font-size:13px;color:#8090a0;margin:0;">Broadcast verified platform updates and moderation alerts.</p>
        </div>
        <button class="btn primary" onclick="window.sendAlert()">Broadcast Notice</button>
      </div>
      
      <div id="notiContainer">
        <div style="padding:40px;text-align:center;color:#8090a0;">Loading admin notifications...</div>
      </div>

    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/communication/communication-status.js"></script>
  <script src="../../shared/communication/notification-service.js"></script>
  <script src="../../shared/communication/communication-ui.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var b = window.FurnostylesFirebaseBridge;
        var notiSvc = window.FurnostylesNotificationService;
        var commUI = window.FurnostylesCommunicationUI;

        if (!b) return;

        function loadNotis() {
          notiSvc.fetchNotifications(null, 'admin', b).then(function (list) {
            var container = document.getElementById('notiContainer');
            if (list.length === 0) {
              container.innerHTML = '<div style="text-align:center;padding:48px;border:1.5px dashed #dce4f0;border-radius:12px;color:#8090a0;font-size:13px;">' +
                'No global admin notices logged yet. Broadcast alert to fill feed.</div>';
              return;
            }

            container.innerHTML = list.map(function (n) {
              return commUI.renderNotificationCard(n);
            }).join('');
          });
        }

        window.sendAlert = function () {
          var title = prompt('Enter Broadcast Title:');
          var msg = prompt('Enter message payload:');
          var role = prompt('Recipient Role (client, vendor, admin):') || 'client';
          if (!title || !msg) return;

          notiSvc.sendNotification({
            type: 'system',
            title: title,
            message: msg,
            recipientRole: role
          }, b).then(function () {
            alert('Notice broadcasted successfully!');
            loadNotis();
          });
        };

        loadNotis();
      });
    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="../shared/firebase/firebase-config.js"></script>
  <script src="../shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="../shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="../assets/js/firestore.js" defer></script>
  <script src="../assets/js/session.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
    <!-- Auth Guard -->
  <script src="../assets/js/auth-guard.js" data-required-role="admin"></script>
</body>
</html>
