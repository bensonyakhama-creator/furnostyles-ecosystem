<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../shared/dashboard-layout.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
      <section class="content-section">
        <div class="fns-dashboard-container">
          <div class="fns-dashboard-header">
            <div>
              <h2 class="fns-dashboard-title">Super Admin Dashboard</h2>
              <div class="fns-dashboard-user-info">
                Role: <strong>Super Admin</strong> &nbsp;|&nbsp; Email: <strong id="userEmail">Loading...</strong>
              </div>
            </div>
            <button id="logoutBtn" class="btn secondary">Sign Out</button>
          </div>

          <!-- Super Admin Overview Metrics -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Platform Overview</h3>
            <div class="fns-metrics-grid" id="metricsGrid">
              <!-- Metrics rendered by JS -->
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Quick Actions</h3>
            <div id="quickActions"></div>
          </div>

          <!-- System Health -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">System Health</h3>
            <div id="healthList"></div>
          </div>
        </div>
      </section>
    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="../../shared/auth/auth-config.js"></script>
  <script src="../../shared/auth/auth-state.js"></script>
  <script src="../../shared/auth/auth-ui.js"></script>
  <script src="../../shared/auth/role-router.js"></script>
  <script src="../../shared/auth/auth-guards.js"></script>
  <script src="../../shared/auth/user-profile-service.js"></script>

  <!-- Dashboard Shared -->
  <script src="../shared/dashboard-data.js"></script>
  <script src="../shared/dashboard-components.js"></script>
  <script src="../shared/dashboard-actions.js"></script>

  <!-- Footer Render -->
  <script defer src="../../shared/layout/footer-data.js"></script>
  <script defer src="../../shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var logoutBtn = document.getElementById('logoutBtn');
      var userEmailEl = document.getElementById('userEmail');
      var metricsGrid = document.getElementById('metricsGrid');
      var quickActions = document.getElementById('quickActions');
      var healthList = document.getElementById('healthList');

      /* Auth guard: require authentication */
      if (window.FurnostylesAuthGuards) {
        window.FurnostylesAuthGuards.requireAuth();
      }

      /* Load user info */
      function loadUserInfo() {
        if (window.FurnostylesAuthState) {
          var user = window.FurnostylesAuthState.getCurrentUser();
          if (user) {
            userEmailEl.textContent = user.email || 'Unknown';
          }
        }
      }

      /* Render dashboard content */
      function renderDashboard() {
        if (!window.FurnostylesDashboardData || !window.FurnostylesDashboardComponents) {
          console.warn('[SuperAdminDashboard] Dashboard data or components not available.');
          return;
        }

        /* Render metrics */
        var metrics = window.FurnostylesDashboardData.getSuperAdminMetrics();
        var metricsData = [
          { label: 'Total Users', value: metrics.totalUsers, icon: '??' },
          { label: 'Total Revenue', value: metrics.totalRevenue, icon: '??' },
          { label: 'Active Subscriptions', value: metrics.activeSubscriptions, icon: '?' },
          { label: 'Pending Issues', value: metrics.pendingIssues, icon: '??' },
          { label: 'System Uptime', value: metrics.systemUptime, icon: '??' },
          { label: 'Total Admins', value: metrics.totalAdmins, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
          { label: 'Total Roles', value: metrics.totalRoles, icon: '??' },
          { label: 'Database Size', value: metrics.databaseSize, icon: '??' },
          { label: 'API Requests', value: metrics.apiRequests, icon: '??' }
        ];

        metricsData.forEach(function (metric) {
          var card = document.createElement('div');
          metricsGrid.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });

        /* Render quick actions */
        var actionsData = [
          { label: 'System Settings', icon: '??', onClick: function () { console.log('System settings - coming soon'); } },
          { label: 'User Management', icon: '??', onClick: function () { console.log('User management - coming soon'); } },
          { label: 'Revenue Reports', icon: '??', onClick: function () { console.log('Revenue reports - coming soon'); } },
          { label: 'System Logs', icon: '??', onClick: function () { console.log('System logs - coming soon'); } }
        ];
        window.FurnostylesDashboardComponents.renderQuickActions(quickActions, actionsData);

        /* Render system health */
        var health = window.FurnostylesDashboardData.getSuperAdminHealth();
        if (health.length === 0) {
          window.FurnostylesDashboardComponents.renderEmptyState(healthList, {
            title: 'No health data',
            message: 'System health data will appear here.',
            icon: '??'
          });
        } else {
          window.FurnostylesDashboardComponents.renderInquiryList(healthList, health.map(function (h) {
            return {
              type: 'system',
              title: h.component,
              status: h.status,
              date: h.uptime,
              vendor: h.lastCheck
            };
          }));
        }
      }

      /* Logout handler */
      logoutBtn.addEventListener('click', function () {
        if (window.FurnostylesAuthState) {
          window.FurnostylesAuthState.signOut()
            .then(function () {
              window.location.href = '../../login.html';
            })
            .catch(function (error) {
              alert('Sign out failed: ' + error.message);
            });
        }
      });

      /* Initialize dashboard on page load */
      function initDashboard() {
        loadUserInfo();
        renderDashboard();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
      } else {
        initDashboard();
      }

    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="../shared/firebase/firebase-config.js"></script>
  <script src="../shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="../shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="../assets/js/firestore.js" defer></script>
  <script src="../assets/js/session.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
    <!-- Auth Guard -->
  <script src="../assets/js/auth-guard.js" data-required-role="super-admin"></script>
</body>
</html>
