<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | Furnostyles Vendor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../../shared/commerce/commerce-layout.css">
</head>
<body>

  <div class="premium-topbar">
    <span><strong>Furnostyles Partner Portal</strong> Vendor Workspace</span>
    <span><b>Secure Session</b></span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="../../index.html">
      <span>Furnostyles Vendor Desk</span>
    </a>
    <div style="font-weight:700;color:#c9a227;font-size:13px;">📦 Order Management</div>
  </header>

  <div class="premium-layout">
    <main class="premium-main" style="padding:32px;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
        <div>
          <h1 style="font-size:24px;font-weight:900;color:#1a2540;margin:0 0 4px;">My Product Orders</h1>
          <p style="font-size:13px;color:#8090a0;margin:0;">View incoming product orders, track payment status, and coordinate delivery.</p>
        </div>
      </div>

      <div class="cm-card">
        <h2 class="cm-section-title">📦 Incoming Orders</h2>
        <div style="overflow-x:auto;">
          <table class="cm-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total (KSh)</th>
                <th>Payment Status</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="ordersTable">
              <tr><td colspan="6" style="text-align:center;padding:30px;color:#8090a0;">Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/commerce/order-service.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var b = window.FurnostylesFirebaseBridge;
        var orderSvc = window.FurnostylesOrderService;

        if (!b) return;

        var vendorId = prompt('Enter Vendor ID to load orders:') || 'vendor123';

        orderSvc.getOrdersByVendor(vendorId, b).then(function (orders) {
          var tbody = document.getElementById('ordersTable');
          if (orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#8090a0;">No orders yet. Commerce system ready for checkout.</td></tr>';
            return;
          }

          tbody.innerHTML = orders.map(function (o) {
            var payBadge = '<span class="cm-badge ' + o.paymentStatus + '">' + o.paymentStatus + '</span>';
            return '<tr>' +
              '<td>' + (o.orderId || o.id.substring(0, 8)) + '</td>' +
              '<td>' + (o.customerName || 'Guest') + '</td>' +
              '<td>' + (o.items ? o.items.length : 0) + ' items</td>' +
              '<td>' + Number(o.total).toLocaleString() + '</td>' +
              '<td>' + payBadge + '</td>' +
              '<td>' + (o.createdAt ? o.createdAt.substring(0, 10) : '') + '</td>' +
            '</tr>';
          }).join('');
        });
      });
    }());
  </script>
</body>
</html>
