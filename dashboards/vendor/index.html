<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../shared/dashboard-layout.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
      <section class="content-section">
        <div class="fns-dashboard-container">
          <div class="fns-dashboard-header">
            <div>
              <h2 class="fns-dashboard-title">Vendor Dashboard</h2>
              <div class="fns-dashboard-user-info">
                Role: <strong>Vendor</strong> &nbsp;|&nbsp; Email: <strong id="userEmail">Loading...</strong>
              </div>
            </div>
            <button id="logoutBtn" class="btn secondary">Sign Out</button>
          </div>

          <!-- Vendor Overview Metrics -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Overview</h3>
            <div class="fns-metrics-grid" id="metricsGrid">
              <!-- Metrics rendered by JS -->
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Quick Actions</h3>
            <div id="quickActions"></div>
          </div>

          <!-- Product Listings -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Product Listings</h3>
            <div id="productList"></div>
          </div>

          <!-- Customer Inquiries -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Customer Inquiries</h3>
            <div id="inquiryList"></div>
          </div>

          <!-- Performance Summary -->
          <div class="fns-dashboard-section">
            <h3 class="fns-dashboard-section-title">Performance Summary</h3>
            <div id="performanceList"></div>
          </div>
        </div>
      </section>
    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <div class="chat-widget">
    <button class="chat-widget-toggle" onclick="toggleChatWidget()" aria-label="Toggle chat options">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" fill="currentColor"/>
      </svg>
    </button>
    <div class="chat-widget-options">
      <a class="chat-option whatsapp" href="https://wa.me/254713639205" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.P157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp
      </a>
      <a class="chat-option messenger" href="https://m.me/furnostyles" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98.97 4.29L2 22l5.71-.97A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.85 0-3.58-.5-5.07-1.37l-.36-.22-3.77.63.63-3.67-.23-.37A7.95 7.95 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8zm4.44-6.19c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.92-1.18-.71-.63-1.19-1.41-1.33-1.65-.14-.24-.01-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.27-.65-.37-.89-.1-.24-.2-.21-.29-.21h-.28c-.1 0-.26.04-.4.19-.14.15-.54.53-.54 1.29s.55 1.5.63 1.6c.08.11 1.09 1.66 2.64 2.33.37.16.66.25.88.32.37.12.71.1.98.06.27-.04.83-.34 1.05-.67.22-.33.22-.61.15-.73-.07-.12-.27-.24-.51-.36z"/>
        </svg>
        Messenger
      </a>
      <a class="chat-option livechat" href="#" onclick="openLiveChat(); return false;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </svg>
        Live Chat
      </a>
    </div>
  </div>

  <script>
    function toggleChatWidget() {
      var widget = document.querySelector('.chat-widget');
      if (widget) {
        widget.classList.toggle('active');
      }
    }

    function openLiveChat() {
      alert('Live chat coming soon! Please use WhatsApp for immediate assistance.');
    }

    document.addEventListener('click', function(e) {
      var widget = document.querySelector('.chat-widget');
      var toggle = document.querySelector('.chat-widget-toggle');
      if (widget && toggle && !widget.contains(e.target) && !toggle.contains(e.target)) {
        widget.classList.remove('active');
      }
    });

    var locationDropdown = document.querySelector('.fld-location-dropdown');
    if (locationDropdown) {
      locationDropdown.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.classList.toggle('active');
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
        }
        if (e.key === 'Escape') {
          this.classList.remove('active');
          this.setAttribute('aria-expanded', 'false');
        }
      });
    }
  </script>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="../../shared/auth/auth-config.js"></script>
  <script src="../../shared/auth/auth-state.js"></script>
  <script src="../../shared/auth/auth-ui.js"></script>
  <script src="../../shared/auth/role-router.js"></script>
  <script src="../../shared/auth/auth-guards.js"></script>
  <script src="../../shared/auth/user-profile-service.js"></script>

  <!-- Listing system -->
  <script src="../../shared/listings/listing-config.js"></script>
  <script src="../../shared/listings/listing-service.js"></script>
  <script src="../../shared/listings/listing-ui.js"></script>

  <!-- Dashboard Shared -->
  <script src="../shared/dashboard-data.js"></script>
  <script src="../shared/dashboard-components.js"></script>
  <script src="../shared/dashboard-actions.js"></script>

  <!-- Footer Render -->
  <script defer src="../../shared/layout/footer-data.js"></script>
  <script defer src="../../shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var logoutBtn = document.getElementById('logoutBtn');
      var userEmailEl = document.getElementById('userEmail');
      var metricsGrid = document.getElementById('metricsGrid');
      var quickActions = document.getElementById('quickActions');
      var productList = document.getElementById('productList');
      var inquiryList = document.getElementById('inquiryList');
      var performanceList = document.getElementById('performanceList');

      /* Auth guard: require authentication */
      if (window.FurnostylesAuthGuards) {
        window.FurnostylesAuthGuards.requireAuth();
      }

      /* Load user info */
      function loadUserInfo() {
        if (window.FurnostylesAuthState) {
          var user = window.FurnostylesAuthState.getCurrentUser();
          if (user) {
            userEmailEl.textContent = user.email || 'Unknown';
          }
        }
      }

      /* Render dashboard content */
      function renderDashboard() {
        if (!window.FurnostylesDashboardData || !window.FurnostylesDashboardComponents) {
          console.warn('[VendorDashboard] Dashboard data or components not available.');
          return;
        }

        /* Render metrics */
        var metrics = window.FurnostylesDashboardData.getVendorMetrics();
        var metricsData = [
          { label: 'Total Products', value: metrics.totalProducts, icon: '📦' },
          { label: 'Active Listings', value: metrics.activeListings, icon: '✅' },
          { label: 'Pending Inquiries', value: metrics.pendingInquiries, icon: '📬' },
          { label: 'Completed Orders', value: metrics.completedOrders, icon: '✓' },
          { label: 'Total Revenue', value: metrics.totalRevenue, icon: '💰' },
          { label: 'Avg Rating', value: metrics.averageRating + ' ⭐', icon: '⭐' },
          { label: 'Verification', value: metrics.verificationStatus, icon: '🔒' }
        ];

        metricsData.forEach(function (metric) {
          var card = document.createElement('div');
          metricsGrid.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });

        /* Render quick actions */
        var actionsData = [
          { label: 'Add Listing',  icon: '➕', onClick: function () { window.location.href = 'add-listing.html'; } },
          { label: 'My Listings',  icon: '—', onClick: function () { window.location.href = 'listings.html'; } },
          { label: 'View Inquiries', icon: '—', onClick: function () { console.log('Inquiries — coming soon'); } },
          { label: 'Update Profile', icon: '—', onClick: function () { console.log('Profile — coming soon'); } }
        ];
        window.FurnostylesDashboardComponents.renderQuickActions(quickActions, actionsData);

        /* Render product listings (live from Firestore) */
        var user = (window.FurnostylesFirebase && window.FurnostylesFirebase.getUser())
                 || (window.FurnostylesAuthState && window.FurnostylesAuthState.getCurrentUser());
        var vendorId = user ? (user.uid || user.id || null) : null;
        if (vendorId && window.FurnostylesListingService) {
          window.FurnostylesListingService.getVendorListings(vendorId)
            .then(function (listings) {
              if (!listings || listings.length === 0) {
                if (window.FurnostylesDashboardComponents) {
                  window.FurnostylesDashboardComponents.renderEmptyState(productList, {
                    title: 'No listings yet',
                    message: 'Start by adding your first listing.',
                    icon: '\uD83D\uDCE6'
                  });
                }
              } else {
                if (window.FurnostylesListingUI) {
                  window.FurnostylesListingUI.renderListingGrid(productList, listings.slice(0, 6), 'add-listing.html');
                }
              }
            })
            .catch(function (err) {
              console.warn('[VendorIndex] Listing load error:', err.message);
              if (window.FurnostylesDashboardComponents) {
                window.FurnostylesDashboardComponents.renderEmptyState(productList, {
                  title: 'Could not load listings',
                  message: err.message,
                  icon: '\u26A0'
                });
              }
            });
        } else {
          window.FurnostylesDashboardComponents && window.FurnostylesDashboardComponents.renderEmptyState(productList, {
            title: 'No listings yet',
            message: 'Start by adding your first listing.',
            icon: '\uD83D\uDCE6'
          });
        }

        /* Render customer inquiries */
        var inquiries = window.FurnostylesDashboardData.getVendorInquiries();
        if (inquiries.length === 0) {
          window.FurnostylesDashboardComponents.renderEmptyState(inquiryList, {
            title: 'No inquiries yet',
            message: 'Customer inquiries will appear here.',
            icon: '📬'
          });
        } else {
          window.FurnostylesDashboardComponents.renderInquiryList(inquiryList, inquiries.map(function (inq) {
            return {
              type: inq.type,
              title: inq.customer + ' - ' + inq.product,
              status: inq.status,
              date: inq.date,
              vendor: inq.message
            };
          }));
        }

        /* Render performance summary */
        var performance = window.FurnostylesDashboardData.getVendorPerformance();
        var performanceData = [
          { label: 'Response Rate', value: performance.responseRate, icon: '📊' },
          { label: 'Avg Response Time', value: performance.averageResponseTime, icon: '⏱️' },
          { label: 'Fulfillment Rate', value: performance.fulfillmentRate, icon: '✓' },
          { label: 'Customer Satisfaction', value: performance.customerSatisfaction + ' ⭐', icon: '⭐' },
          { label: 'Monthly Sales', value: performance.monthlySales, icon: '📈' },
          { label: 'Revenue Growth', value: performance.revenueGrowth, icon: '📈' }
        ];

        performanceData.forEach(function (metric) {
          var card = document.createElement('div');
          performanceList.appendChild(card);
          window.FurnostylesDashboardComponents.renderMetricCard(card, metric);
        });
      }

      /* Logout handler */
      logoutBtn.addEventListener('click', function () {
        if (window.FurnostylesAuthState) {
          window.FurnostylesAuthState.signOut()
            .then(function () {
              window.location.href = '../../login.html';
            })
            .catch(function (error) {
              alert('Sign out failed: ' + error.message);
            });
        }
      });

      /* Initialize dashboard on page load */
      function initDashboard() {
        loadUserInfo();
        renderDashboard();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDashboard);
      } else {
        initDashboard();
      }

    }());
  </script>
</body>
</html>
