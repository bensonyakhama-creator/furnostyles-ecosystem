<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordinated Notifications | Furnostyles Contractor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <link rel="stylesheet" href="../../shared/layout/footer.css">
  <link rel="stylesheet" href="../../shared/communication/communication-layout.css">
</head>
<body>

  <div class="premium-topbar">
    <span><strong>Furnostyles Contractor Portal</strong> Contractor Workspace</span>
    <span><b>Secure Session</b></span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="../../index.html">
      <span>Furnostyles Contractor Desk</span>
    </a>
    <div style="font-weight:700;color:#c9a227;font-size:13px;display:flex;align-items:center;gap:8px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      Partner Notifications
    </div>
  </header>

  <div class="premium-layout">
    <main class="premium-main" style="padding:32px; max-width: 800px; margin: 0 auto;">

      <h1 style="font-size:24px;font-weight:900;color:#1a2540;margin:0 0 16px;">Contractor Notifications</h1>
      
      <div id="notiContainer">
        <div style="padding:40px;text-align:center;color:#8090a0;">Loading notifications feed...</div>
      </div>

    </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>
  </div>

  <script src="../../shared/firebase/firebase-config.js"></script>
  <script src="../../shared/firebase/firebase-bridge.js"></script>
  <script src="../../shared/communication/communication-status.js"></script>
  <script src="../../shared/communication/notification-service.js"></script>
  <script src="../../shared/communication/communication-ui.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var b = window.FurnostylesFirebaseBridge;
        var notiSvc = window.FurnostylesNotificationService;
        var commUI = window.FurnostylesCommunicationUI;

        if (!b) return;

        var contractId = prompt('Enter Contractor ID to load notifications:') || 'contractor123';

        notiSvc.fetchNotifications(contractId, 'provider', b).then(function (list) {
          var container = document.getElementById('notiContainer');
          if (list.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:48px;border:1.5px dashed #dce4f0;border-radius:12px;color:#8090a0;font-size:13px;">' +
              'No notifications yet. Coordinated events will appear here.</div>';
            return;
          }

          container.innerHTML = list.map(function (n) {
            return commUI.renderNotificationCard(n);
          }).join('');
        });
      });
    }());
  </script>
</body>
</html>
