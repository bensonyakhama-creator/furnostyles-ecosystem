<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Furnostyles - Unified Account Dashboard</title>
  <meta name="description" content="Access all your Furnostyles features from one unified dashboard. Switch between customer, vendor, and admin roles seamlessly.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
  <link rel="stylesheet" href="shared/rendering/marketplace.css">
  <script src="shared/dashboard/unified-dashboard.js"></script>
</head>
<body>
  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <div style="max-width: 1200px; margin: 0 auto; padding: 40px 24px;">
        
        <div class="section-header" style="text-align: center; margin-bottom: 40px;">
          <span class="section-badge">Unified Dashboard</span>
          <h1>Your All-in-One Control Center</h1>
          <p>Switch between roles seamlessly - one account, unlimited possibilities</p>
        </div>

        <div id="unified-dashboard-container">
          <!-- Dashboard content will be rendered here -->
        </div>

      </div>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Session -->
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
  <script defer src="assets/js/app.js"></script>
  <script defer src="shared/firebase/firebase-config.js"></script>
  <script defer src="shared/firebase/firebase-bridge.js"></script>
  <script defer src="shared/layout/footer-data.js"></script>
  <script defer src="shared/layout/footer-render.js"></script>

  <script>
    (function() {
      'use strict';
      document.addEventListener('DOMContentLoaded', function() {
        // Initialize dashboard if user is logged in
        const userSession = localStorage.getItem('fns_local_user');
        if (!userSession) {
          window.location.href = 'login.html';
          return;
        }

        // Initialize unified dashboard
        if (window.FurnostylesUnifiedDashboard) {
          try {
            window.FurnostylesUnifiedDashboard.init();
          } catch (e) {
            console.error('Dashboard initialization error:', e);
          }
        } else {
          console.error('FurnostylesUnifiedDashboard not loaded');
        }
      });
    })();
  </script>
</body>
</html>
