<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Sign in to your Furnostyles account to access your dashboard, orders, and personalized recommendations.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>
  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <div class="auth-container">
        <h1>Sign In</h1>
        <p>Welcome back! Please enter your details.</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </div>

          <div class="form-group">
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn primary full-width">Sign In</button>
        </form>

        <div class="social-login">
          <p>Or continue with</p>
          <button id="googleSignInBtn" class="btn google-btn">
            <span>Google</span>
          </button>
        </div>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Sign up</a>
        </p>
      </div>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js" defer></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="shared/layout/footer-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';

      var form = document.getElementById('loginForm');
      var emailInput = document.getElementById('email');
      var passwordInput = document.getElementById('password');
      var googleBtn = document.getElementById('googleSignInBtn');

      function setLoading(loading) {
        var btn = form.querySelector('button[type="submit"]');
        if (loading) {
          btn.disabled = true;
          btn.textContent = 'Signing in...';
        } else {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      }

      function showErr(msg) {
        alert(msg);
      }

      function showSuc(msg) {
        alert(msg);
      }

      function getRedirect() {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('redirect') || 'index.html';
      }

      function saveLocalUser(user) {
        localStorage.setItem('fns_local_user', JSON.stringify(user));
      }

      // Email/password login
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        var password = passwordInput.value;

        if (!email || !password) {
          showErr('Please fill in all fields');
          return;
        }

        setLoading(true);

        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.signIn(email, password)
            .then(function(user) {
              showSuc('Login successful! Redirecting...');
              setTimeout(function() { location.href = getRedirect(); }, 700);
            })
            .catch(function(err) {
              setLoading(false);
              showErr('Login failed: ' + err.message);
            });
        } else {
          setLoading(false);
          showErr('Auth system not loaded. Please refresh the page.');
        }
      });

      // Google sign-in
      googleBtn.addEventListener('click', function() {
        if (window.FurnostylesAuth) {
          setLoading(true);
          window.FurnostylesAuth.signInWithGoogle()
            .then(function(user) {
              showSuc('Google sign in successful! Redirecting...');
              setTimeout(function() { location.href = getRedirect(); }, 700);
            })
            .catch(function(err) {
              setLoading(false);
              showErr('Google sign in failed: ' + err.message);
            });
        } else {
          /* Local demo mode */
          var demoUser = { uid: 'google_demo', email: 'demo@furnostyles.com', displayName: 'Demo User' };
          saveLocalUser(demoUser);
          showSuc('Demo sign in successful! Redirecting...');
          setTimeout(function() { location.href = getRedirect(); }, 700);
        }
      });
    })();
  </script>
</body>
</html>
