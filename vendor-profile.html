<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="View verified local workshops, artisans, and premium sellers partnered with Furnostyles. Browse approved listings and request bespoke furniture.">
  <meta name="keywords" content="furniture workshops, local artisans, custom upholstery, verified sellers Nairobi">
  <meta name="author" content="Furnostyles">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://furnostyles.com/vendor-profile.html">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
  <link rel="stylesheet" href="shared/rendering/marketplace.css">
  <link rel="stylesheet" href="shared/vendors/vendor-layout.css">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Furnostyles">
  <meta property="og:title" content="Vendor Profile | Furnostyles Partner Workshop">
  <meta property="og:description" content="View verified local workshops, artisans, and premium sellers partnered with Furnostyles. Browse approved listings and request bespoke furniture.">
  <meta property="og:url" content="https://furnostyles.com/vendor-profile.html">
  <meta property="og:image" content="https://furnostyles.com/assets/images/hero.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vendor Profile | Furnostyles Partner Workshop">
  <meta name="twitter:image" content="https://furnostyles.com/assets/images/hero.jpg">

</head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">

      <div id="vndHeader"></div>
      <div id="vndMain"></div>
      <div id="vndRecs" class="mp-recs" style="padding-top: 32px; background: #fff; border-top: 1.5px solid #dce4f0;"></div>

    </main>
  </div>

  <a class="cart-float" href="cart.html">Cart <span data-cart-count>0</span></a>
  <a class="chat-float" href="https://wa.me/254713639205" target="_blank" rel="noopener noreferrer">WhatsApp Chat</a>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script defer src="js/main.js"></script>
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-bridge.js"></script>
  <script src="shared/uploads/upload-bridge.js"></script>
  <script defer src="shared/rendering/public-filter.js"></script>
  <script defer src="shared/rendering/marketplace-renderer.js"></script>
  <script defer src="shared/rendering/property-renderer.js"></script>
  <script defer src="shared/rendering/repair-renderer.js"></script>
  <script defer src="shared/rendering/recommendation-renderer.js"></script>
  <script defer src="shared/vendors/vendor-profile-ui.js"></script>
  <script defer src="shared/vendors/vendor-renderer.js"></script>
  <script defer src="shared/vendors/vendor-recommendations.js"></script>
  <script defer src="shared/layout/footer-data.js"></script>
  <script defer src="shared/layout/footer-render.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var UI = window.FurnostylesVendorProfileUI, VR = window.FurnostylesVendorRenderer, VRec = window.FurnostylesVendorRecommendations;
        var hContainer = document.getElementById('vndHeader'), mContainer = document.getElementById('vndMain'), rContainer = document.getElementById('vndRecs');
        if (!UI || !VR) return;
        UI.renderLoading(mContainer);
        var id = UI.getParam('id');
        if (!id) { UI.renderNotFound(mContainer, 'vendor'); return; }
        var b = window.FurnostylesFirebaseBridge;
        if (!b) { UI.renderError(mContainer, 'Firebase bridge not available.'); return; }

        // Fetch user document from 'users' collection as vendor profile source, then fetch listings
        b.get('users', id)
          .then(function (userDoc) {
            // Verify role is appropriate for workshop vendor
            if (!userDoc || (userDoc.role !== 'vendor' && userDoc.role !== 'admin')) {
              UI.renderNotFound(mContainer, 'vendor');
              return;
            }
            // Fetch this vendor's approved listings from listings collection
            b.list('listings', {
              where: [
                { field: 'vendorId', operator: '==', value: id },
                { field: 'status', operator: '==', value: 'approved' }
              ]
            }).then(function (listings) {
              VR.renderVendorProfile(hContainer, mContainer, userDoc, listings);
              if (VRec) VRec.loadForVendor(rContainer, id);
            }).catch(function (err) {
              UI.renderError(mContainer, err.message);
            });
          })
          .catch(function (err) {
            UI.renderError(mContainer, err.message);
          });
      });
    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Session -->
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
