<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Create your Furnostyles account to access premium furniture, materials, and services.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>
  <div id="fns-header-mount"></div>

  <div class="auth-page-wrapper">
    <div class="auth-container">
      <h1>Create Account</h1>
      <p>Join Furnostyles for premium furniture, materials, and services.</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="+254 7XX XXX XXX">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Create a strong password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
        </div>

        <div class="form-group">
          <label for="role">Account Type</label>
          <select id="role" name="role">
            <option value="client">Client (Buyer)</option>
            <option value="individual-seller">Individual Seller (Secondhand)</option>
            <option value="individual-landlord">Individual Landlord</option>
            <option value="vendor">Business Vendor</option>
            <option value="provider">Service Provider</option>
            <option value="property-owner">Property Owner</option>
          </select>
        </div>

        <button type="submit" class="btn primary full-width">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="shared/layout/footer-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';

      var form = document.getElementById('registerForm');
      var fullNameInput = document.getElementById('fullName');
      var emailInput = document.getElementById('email');
      var phoneInput = document.getElementById('phone');
      var passwordInput = document.getElementById('password');
      var confirmPasswordInput = document.getElementById('confirmPassword');
      var roleSelect = document.getElementById('role');

      function setLoading(loading) {
        var btn = form.querySelector('button[type="submit"]');
        if (loading) {
          btn.disabled = true;
          btn.textContent = 'Creating account...';
        } else {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      }

      function showErr(msg) {
        alert(msg);
      }

      function showSuc(msg) {
        alert(msg);
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var fullName = fullNameInput.value.trim();
        var email = emailInput.value.trim();
        var phone = phoneInput.value.trim();
        var password = passwordInput.value;
        var confirmPassword = confirmPasswordInput.value;
        var role = roleSelect.value;

        if (!fullName || !email || !phone || !password || !confirmPassword) {
          showErr('Please fill in all fields');
          return;
        }

        if (password !== confirmPassword) {
          showErr('Passwords do not match');
          return;
        }

        if (password.length < 6) {
          showErr('Password must be at least 6 characters');
          return;
        }

        setLoading(true);

        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.signUp(email, password, {
            fullName: fullName,
            phone: phone,
            role: role
          })
            .then(function(user) {
              showSuc('Account created successfully! Redirecting...');
              setTimeout(function() { location.href = 'login.html'; }, 1500);
            })
            .catch(function(err) {
              setLoading(false);
              showErr('Registration failed: ' + err.message);
            });
        } else {
          setLoading(false);
          showErr('Auth system not loaded. Please refresh the page.');
        }
      });
    })();
  </script>
</body>
</html>
