<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Furnostyles � Personal Luxury. Elevated.</title>
  <meta name="description" content="Reset your Furnostyles password with the link from your email.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <div class="auth-container">
        <h1>Reset Password</h1>
        <p id="statusMessage">Enter your new password below.</p>
        
        <form id="resetPasswordForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password" minlength="6">
          </div>
          
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" minlength="6">
          </div>

          <button type="submit" class="btn primary full-width">Update Password</button>
        </form>

        <p class="auth-footer">
          <a href="login.html">Back to Sign In</a>
        </p>
      </div>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth -->
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';
      
      var form = document.getElementById('resetPasswordForm');
      var newPasswordInput = document.getElementById('newPassword');
      var confirmPasswordInput = document.getElementById('confirmPassword');
      var statusMessage = document.getElementById('statusMessage');
      
      // Check URL for action code (from email link)
      var urlParams = new URLSearchParams(window.location.search);
      var actionCode = urlParams.get('oobCode');
      var mode = urlParams.get('mode');
      
      if (!actionCode || mode !== 'resetPassword') {
        statusMessage.textContent = 'Invalid or expired password reset link. Please request a new one.';
        form.style.display = 'none';
        return;
      }
      
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        var newPassword = newPasswordInput.value;
        var confirmPassword = confirmPasswordInput.value;
        
        if (newPassword !== confirmPassword) {
          statusMessage.textContent = 'Passwords do not match.';
          return;
        }
        
        if (newPassword.length < 6) {
          statusMessage.textContent = 'Password must be at least 6 characters.';
          return;
        }
        
        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.confirmPasswordReset(actionCode, newPassword)
            .then(function() {
              statusMessage.textContent = 'Password updated successfully! Redirecting to login...';
              setTimeout(function() {
                window.location.href = 'login.html';
              }, 2000);
            })
            .catch(function(error) {
              statusMessage.textContent = 'Error: ' + error.message;
            });
        } else {
          statusMessage.textContent = 'Auth system not loaded. Please refresh the page.';
        }
      });
    })();
  </script>
</body>
</html>
