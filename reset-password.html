<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Furnostyles � Personal Luxury. Elevated.</title>
  <meta name="description" content="Reset your Furnostyles password with the link from your email.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <div class="auth-container">
        <h1>Reset Password</h1>
        <p id="statusMessage">Enter your new password below.</p>
        
        <form id="resetPasswordForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password" minlength="6">
          </div>
          
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" minlength="6">
          </div>

          <button type="submit" class="btn primary full-width">Update Password</button>
        </form>

        <p class="auth-footer">
          <a href="login.html">Back to Sign In</a>
        </p>
      </div>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Security Modules -->
  <script src="shared/auth/rate-limiter.js"></script>
  <script src="shared/dashboard/modal-helper.js"></script>
  <!-- Auth -->
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';
      
      var form = document.getElementById('resetPasswordForm');
      var newPasswordInput = document.getElementById('newPassword');
      var confirmPasswordInput = document.getElementById('confirmPassword');
      var statusMessage = document.getElementById('statusMessage');
      var submitBtn = form.querySelector('button[type="submit"]');
      
      function showAlert(message, title) {
        if (window.FurnostylesModal) {
          window.FurnostylesModal.alert({
            title: title || 'Notice',
            message: message
          });
        } else {
          alert(message);
        }
      }
      
      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Updating...';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      }
      
      // Check URL for action code (from email link)
      var urlParams = new URLSearchParams(window.location.search);
      var actionCode = urlParams.get('oobCode');
      var mode = urlParams.get('mode');
      
      if (!actionCode || mode !== 'resetPassword') {
        statusMessage.textContent = 'Invalid or expired password reset link. Please request a new one.';
        form.style.display = 'none';
        return;
      }
      
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        var newPassword = newPasswordInput.value;
        var confirmPassword = confirmPasswordInput.value;
        
        if (newPassword !== confirmPassword) {
          showAlert('Passwords do not match.', 'Error');
          return;
        }
        
        if (newPassword.length < 6) {
          showAlert('Password must be at least 6 characters.', 'Error');
          return;
        }
        
        // Check rate limiting based on action code
        if (window.FurnostylesRateLimiter) {
          var rateCheck = window.FurnostylesRateLimiter.checkAttempt(actionCode, 'password_reset_confirm');
          if (!rateCheck.allowed) {
            showAlert('Too many attempts. Please try again in ' + Math.ceil(rateCheck.lockoutTime / 60000) + ' minutes.', 'Error');
            return;
          }
        }
        
        setLoading(true);
        
        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.confirmPasswordReset(actionCode, newPassword)
            .then(function() {
              // Clear rate limit on successful reset
              if (window.FurnostylesRateLimiter) {
                window.FurnostylesRateLimiter.clearAttempts(actionCode, 'password_reset_confirm');
              }
              showAlert('Password updated successfully! Redirecting to login...', 'Success');
              setTimeout(function() {
                window.location.href = 'login.html';
              }, 2000);
            })
            .catch(function(error) {
              setLoading(false);
              // Record failed attempt
              if (window.FurnostylesRateLimiter) {
                window.FurnostylesRateLimiter.recordAttempt(actionCode, 'password_reset_confirm');
              }
              showAlert('Error: ' + error.message, 'Error');
            });
        } else {
          setLoading(false);
          showAlert('Auth system not loaded. Please refresh the page.', 'Error');
        }
      });
    })();
  </script>
</body>
</html>
