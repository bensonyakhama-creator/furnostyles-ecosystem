<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <section class="content-section">
        <div class="section-header">
          <span>MARKETPLACE</span>
          <h1>Listings</h1>
          <p>Browse furniture, materials, and services.</p>
        </div>

        <div style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">
          <a href="furniture-marketplace.html" style="background: rgba(11, 59, 70, 0.05); border-radius: 16px; padding: 24px; border: 1px solid rgba(212, 175, 55, 0.1); text-decoration: none; color: inherit;">
            <h3 style="font-size: 18px; color: var(--fns-gold-primary); margin: 0 0 12px;">Furniture</h3>
            <p style="font-size: 14px; color: var(--fns-text-light); line-height: 1.6;">Browse furniture listings.</p>
          </a>
          <a href="materials-marketplace.html" style="background: rgba(11, 59, 70, 0.05); border-radius: 16px; padding: 24px; border: 1px solid rgba(212, 175, 55, 0.1); text-decoration: none; color: inherit;">
            <h3 style="font-size: 18px; color: var(--fns-gold-primary); margin: 0 0 12px;">Materials</h3>
            <p style="font-size: 14px; color: var(--fns-text-light); line-height: 1.6;">Browse building materials.</p>
          </a>
          <a href="services.html" style="background: rgba(11, 59, 70, 0.05); border-radius: 16px; padding: 24px; border: 1px solid rgba(212, 175, 55, 0.1); text-decoration: none; color: inherit;">
            <h3 style="font-size: 18px; color: var(--fns-gold-primary); margin: 0 0 12px;">Services</h3>
            <p style="font-size: 14px; color: var(--fns-text-light); line-height: 1.6;">Browse service listings.</p>
          </a>
        </div>
      </section>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>

  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>
