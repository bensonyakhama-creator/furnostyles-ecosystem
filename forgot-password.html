<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Reset your Furnostyles password. Enter your email to receive a password reset link.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>
  <div id="fns-header-mount"></div>

  <nav class="marketplace-link-strip premium-market-scroll" aria-label="Quick Links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="ecosystem.html">Ecosystem</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="auth-page-wrapper">
    <div class="auth-container">
      <h1>Reset Password</h1>
      <p>Enter your email address and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <button type="submit" class="btn primary full-width">Send Reset Link</button>
      </form>

      <p class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js"></script>
  <!-- Security Modules -->
  <script src="shared/auth/rate-limiter.js"></script>
  <script src="shared/dashboard/modal-helper.js"></script>
  <!-- Auth -->
  <script src="assets/js/auth.js"></script>
  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="shared/layout/footer-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';

      var form = document.getElementById('forgotPasswordForm');
      var emailInput = document.getElementById('email');
      var submitBtn = form.querySelector('button[type="submit"]');

      function showAlert(message, title) {
        if (window.FurnostylesModal) {
          window.FurnostylesModal.alert({
            title: title || 'Notice',
            message: message
          });
        } else {
          alert(message);
        }
      }

      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Sending...';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Reset Link';
        }
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = emailInput.value.trim();

        if (!email) {
          showAlert('Please enter your email address.', 'Error');
          return;
        }

        // Check rate limiting
        if (window.FurnostylesRateLimiter) {
          var rateCheck = window.FurnostylesRateLimiter.checkAttempt(email, 'password_reset');
          if (!rateCheck.allowed) {
            showAlert('Too many password reset attempts. Please try again in ' + Math.ceil(rateCheck.lockoutTime / 60000) + ' minutes.', 'Error');
            return;
          }
        }

        setLoading(true);

        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.resetPassword(email)
            .then(function() {
              // Clear rate limit on successful request
              if (window.FurnostylesRateLimiter) {
                window.FurnostylesRateLimiter.clearAttempts(email, 'password_reset');
              }
              showAlert('Password reset email sent! Check your inbox.', 'Success');
              setTimeout(function() { window.location.href = 'login.html'; }, 2000);
            })
            .catch(function(error) {
              setLoading(false);
              // Record failed attempt
              if (window.FurnostylesRateLimiter) {
                window.FurnostylesRateLimiter.recordAttempt(email, 'password_reset');
              }
              showAlert('Error: ' + error.message, 'Error');
            });
        } else {
          setLoading(false);
          showAlert('Auth system not loaded. Please refresh the page.', 'Error');
        }
      });
    })();
  </script>
</body>
</html>
