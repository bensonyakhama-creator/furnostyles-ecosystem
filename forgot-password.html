<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Reset your Furnostyles password. Enter your email to receive a password reset link.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
</head>
<body>
  <div id="fns-header-mount"></div>

  <div class="auth-page-wrapper">
    <div class="auth-container">
      <h1>Reset Password</h1>
      <p>Enter your email address and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <button type="submit" class="btn primary full-width">Send Reset Link</button>
      </form>

      <p class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth -->
  <script src="assets/js/auth.js" defer></script>
  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js" defer></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="shared/layout/footer-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script>
    (function() {
      'use strict';

      var form = document.getElementById('forgotPasswordForm');
      var emailInput = document.getElementById('email');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = emailInput.value.trim();

        if (!email) {
          alert('Please enter your email address.');
          return;
        }

        if (window.FurnostylesAuth) {
          window.FurnostylesAuth.resetPassword(email)
            .then(function() {
              alert('Password reset email sent! Check your inbox.');
              window.location.href = 'login.html';
            })
            .catch(function(error) {
              alert('Error: ' + error.message);
            });
        } else {
          alert('Auth system not loaded. Please refresh the page.');
        }
      });
    })();
  </script>
</body>
</html>
