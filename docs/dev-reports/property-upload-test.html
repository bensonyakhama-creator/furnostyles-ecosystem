<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Upload Test | Furnostyles</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/uploads/upload.css">
  <style>
    body { background: #f0f2f7; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: #1a2540; }

    .ut-page-header {
      background: #1a2540; color: #fff; padding: 20px 32px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .ut-page-header a { color: #aac4f0; text-decoration: none; font-size: 13px; }
    .ut-page-header a:hover { text-decoration: underline; }
    .ut-page-title { font-size: 20px; font-weight: 700; margin: 0; }
    .ut-page-tag {
      background: #0a6e3a; color: #fff; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase;
    }

    .ut-main { max-width: 960px; margin: 32px auto; padding: 0 20px 60px; }

    .ut-card {
      background: #fff; border: 1px solid #dde3ef; border-radius: 10px;
      padding: 28px; margin-bottom: 24px;
    }
    .ut-card-title { font-size: 17px; font-weight: 700; color: #1a2540; margin: 0 0 20px; padding-bottom: 12px; border-bottom: 1px solid #edf0f7; }

    .ut-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .ut-form-grid .ut-full { grid-column: 1 / -1; }
    .ut-form-grid .ut-third { grid-column: span 1; }

    .ut-field { display: flex; flex-direction: column; gap: 6px; }
    .ut-label { font-size: 13px; font-weight: 600; color: #3c4f72; }
    .ut-label span { color: #cc1a1a; margin-left: 2px; }
    .ut-input, .ut-select, .ut-textarea {
      padding: 10px 13px; border: 1px solid #d0d7e3; border-radius: 6px;
      font-size: 14px; color: #1a2540; background: #f9fafc; width: 100%; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .ut-input:focus, .ut-select:focus, .ut-textarea:focus {
      outline: none; border-color: #0a6e3a; background: #fff;
    }
    .ut-textarea { resize: vertical; min-height: 100px; }
    .ut-hint { font-size: 12px; color: #8a95ae; margin-top: 2px; }

    .ut-price-row { display: flex; gap: 8px; }
    .ut-price-row .ut-select { flex: 0 0 110px; }
    .ut-price-row .ut-input  { flex: 1; }

    .ut-section-label {
      font-size: 15px; font-weight: 700; color: #1a2540; margin: 0 0 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .ut-section-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      background: #d4f5e2; color: #1a6e3a; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .ut-submit-btn {
      display: block; width: 100%; padding: 13px 24px; background: #1a2540;
      color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; text-align: center;
    }
    .ut-submit-btn:hover { background: #0a6e3a; }

    .ut-result {
      display: none; margin-top: 24px; background: #f0faf4;
      border: 1px solid #b6dfc6; border-radius: 10px; padding: 22px;
    }
    .ut-result-title { font-size: 15px; font-weight: 700; color: #1a6e3a; margin: 0 0 14px; }
    .ut-result-row { font-size: 13px; padding: 5px 0; border-bottom: 1px solid #d4f5e2; display: flex; gap: 10px; }
    .ut-result-row:last-child { border-bottom: none; }
    .ut-result-key { font-weight: 600; min-width: 140px; color: #3c4f72; flex-shrink: 0; }
    .ut-result-val { word-break: break-all; color: #1a2540; }
    .ut-firebase-note {
      margin-top: 14px; padding: 10px 14px; background: #fffbea;
      border: 1px solid #f0d890; border-radius: 6px; font-size: 12px; color: #8a5d00;
    }

    @media (max-width: 640px) {
      .ut-form-grid { grid-template-columns: 1fr; }
      .ut-form-grid .ut-full { grid-column: 1; }
    }
  </style>
  
</head>
<body>

  <div class="ut-page-header">
    <div>
      <p style="margin:0 0 3px;"><a href="index.html">&larr; Back</a> &nbsp;|&nbsp; <a href="upload-test.html">Upload Widget Test</a></p>
      <h1 class="ut-page-title">Property Listing Upload Form</h1>
    </div>
    <span class="ut-page-tag">Phase 16 Test</span>
  </div>

  <div class="ut-main">

    <!-- Form fields -->
    <div class="ut-card">
      <h2 class="ut-card-title">Property Details</h2>
      <div class="ut-form-grid">

        <div class="ut-field ut-full">
          <label class="ut-label" for="propTitle">Property Title <span>*</span></label>
          <input type="text" id="propTitle" class="ut-input" placeholder="e.g. Modern 3-Bedroom Apartment in Kilimani" required>
        </div>

        <div class="ut-field">
          <label class="ut-label" for="propType">Property Type <span>*</span></label>
          <select id="propType" class="ut-select" required>
            <option value="">Select type...</option>
            <option value="apartment">Apartment</option>
            <option value="house">House / Bungalow</option>
            <option value="villa">Villa / Mansion</option>
            <option value="townhouse">Townhouse / Maisonette</option>
            <option value="commercial">Commercial Space</option>
            <option value="office">Office Space</option>
            <option value="land">Land / Plot</option>
            <option value="warehouse">Warehouse / Godown</option>
          </select>
        </div>

        <div class="ut-field">
          <label class="ut-label" for="listingType">Listing Type <span>*</span></label>
          <select id="listingType" class="ut-select" required>
            <option value="">Select...</option>
            <option value="sale">For Sale</option>
            <option value="rent">For Rent</option>
            <option value="airbnb">Airbnb / Short Stay</option>
            <option value="lease">Long Term Lease</option>
          </select>
        </div>

        <div class="ut-field ut-full">
          <label class="ut-label" for="propLocation">Location <span>*</span></label>
          <input type="text" id="propLocation" class="ut-input" placeholder="e.g. Kilimani, Nairobi" required>
        </div>

        <div class="ut-field">
          <label class="ut-label" for="propBedrooms">Bedrooms</label>
          <select id="propBedrooms" class="ut-select">
            <option value="">—</option>
            <option value="studio">Studio</option>
            <option value="1">1 Bedroom</option>
            <option value="2">2 Bedrooms</option>
            <option value="3">3 Bedrooms</option>
            <option value="4">4 Bedrooms</option>
            <option value="5+">5+ Bedrooms</option>
          </select>
        </div>

        <div class="ut-field">
          <label class="ut-label" for="propPrice">Price / Rent (KSh) <span>*</span></label>
          <div class="ut-price-row">
            <select id="propPricePeriod" class="ut-select">
              <option value="total">Total</option>
              <option value="month">/month</option>
              <option value="night">/night</option>
              <option value="sqft">/sq ft</option>
            </select>
            <input type="number" id="propPrice" class="ut-input" placeholder="e.g. 8500000" min="0" required>
          </div>
        </div>

        <div class="ut-field ut-full">
          <label class="ut-label" for="propDesc">Description <span>*</span></label>
          <textarea id="propDesc" class="ut-textarea" placeholder="Describe the property — size, features, nearby amenities, condition..." required></textarea>
        </div>

      </div>
    </div>

    <!-- Upload Widget -->
    <div class="ut-card">
      <div class="ut-section-label">
        Property Photos
        <span class="ut-section-badge">Min 3 required</span>
      </div>
      <p class="ut-hint" style="margin:0 0 16px;">Add exterior, interior, and area shots. Mix local files and image URLs.</p>
      <div id="propertyUploadContainer"></div>
    </div>

    <!-- Submit -->
    <button type="button" id="submitPropertyBtn" class="ut-submit-btn">Submit Property Listing</button>

    <!-- Result (filled by FurnostylesListingUI) -->
    <div id="propertyResult" style="display:none;"></div>

  </div>

  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-bridge.js"></script>
  <script src="shared/firebase/storage-service.js"></script>
  <script src="shared/uploads/upload-config.js"></script>
  <script src="shared/uploads/upload-validation.js"></script>
  <script src="shared/uploads/upload-service.js"></script>
  <script src="shared/uploads/upload-ui.js"></script>

  <!-- Listing system -->
  <script src="shared/listings/listing-config.js"></script>
  <script src="shared/listings/listing-types.js"></script>
  <script src="shared/listings/listing-validation.js"></script>
  <script src="shared/listings/listing-service.js"></script>
  <script src="shared/listings/listing-ui.js"></script>

  <script>
    (function () {
      'use strict';

      var uploadAPI = null;

      function init() {
        uploadAPI = window.FurnostylesUploadUI.init(
          document.getElementById('propertyUploadContainer'),
          {
            context:     'properties',
            minImages:   3,
            submitLabel: 'Confirm Property Photos',
            onChange: function () {
              window.FurnostylesListingUI && window.FurnostylesListingUI.clearState(
                document.getElementById('propertyResult')
              );
            }
          }
        );

        document.getElementById('submitPropertyBtn').addEventListener('click', function () {
          var title    = document.getElementById('propTitle').value.trim();
          var type     = document.getElementById('propType').value;
          var listing  = document.getElementById('listingType').value;
          var location = document.getElementById('propLocation').value.trim();
          var price    = document.getElementById('propPrice').value.trim();
          var period   = document.getElementById('propPricePeriod').value;
          var beds     = document.getElementById('propBedrooms').value;
          var desc     = document.getElementById('propDesc').value.trim();

          if (!title || !type || !listing || !location || !price || !desc) {
            alert('Please fill in all required fields.');
            return;
          }

          var imgResult = uploadAPI.validate();
          if (!imgResult.valid) {
            uploadAPI.showMessage(imgResult.errors.join(' '), 'error');
            document.getElementById('propertyUploadContainer').scrollIntoView({ behavior: 'smooth' });
            return;
          }

          uploadAPI.clearMessage();

          /* Loading state */
          var resultEl  = document.getElementById('propertyResult');
          var listingUI = window.FurnostylesListingUI;
          if (listingUI) listingUI.showLoading(resultEl, 'Uploading photos and saving to Firestore\u2026');

          /* 1. Upload to Storage \u2192 2. Save property to Firestore */
          uploadAPI.uploadAndGetURLs()
            .then(function (uploadResult) {
              return window.FurnostylesListingService.submitProperty({
                title:        title,
                location:     location,
                priceOrRent:  Number(price),
                pricePeriod:  period,
                propertyType: type,
                listingMode:  listing,
                bedrooms:     beds,
                description:  desc,
                sourcePage:   'property-upload-test'
              }, uploadResult);
            })
            .then(function (saved) {
              if (listingUI) listingUI.showSuccess(resultEl, 'Property submitted!', {
                id:         saved.id,
                collection: 'properties',
                status:     saved.status || 'pending',
                imageCount: saved.images ? saved.images.length : 0,
                uploadMode: saved.uploadMode
              });
            })
            .catch(function (err) {
              if (listingUI) listingUI.showError(resultEl, err.message, function () {
                document.getElementById('submitPropertyBtn').click();
              });
            });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    }());
  </script>
</body>
</html>
