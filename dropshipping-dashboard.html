<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropshipping Dashboard | Furnostyles</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js"></script>
  <script src="shared/layout/footer-data.js"></script>
  <script src="shared/layout/footer-render.js"></script>
  <script src="shared/dropshipping/dropshipping-system.js"></script>
</head>
<body>
  <div id="header-mount"></div>

  <main style="min-height: 80vh; padding: 40px 24px;">
    <div style="max-width: 1400px; margin: 0 auto;">
      <!-- Page Header -->
      <div style="margin-bottom: 32px;">
        <h1 style="font-size: 32px; font-weight: 700; color: #1a2540; margin: 0 0 8px;">Dropshipping Dashboard</h1>
        <p style="font-size: 16px; color: #8090a0; margin: 0;">Manage your dropshipping products, orders, and commissions</p>
      </div>

      <!-- Stats Cards -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 32px;">
        <div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; padding: 24px;">
          <div style="font-size: 14px; color: #8090a0; margin-bottom: 8px;">Total Products</div>
          <div id="stat-products" style="font-size: 32px; font-weight: 700; color: #0b3b46;">0</div>
        </div>
        <div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; padding: 24px;">
          <div style="font-size: 14px; color: #8090a0; margin-bottom: 8px;">Active Orders</div>
          <div id="stat-orders" style="font-size: 32px; font-weight: 700; color: #0b3b46;">0</div>
        </div>
        <div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; padding: 24px;">
          <div style="font-size: 14px; color: #8090a0; margin-bottom: 8px;">Pending Commissions</div>
          <div id="stat-pending" style="font-size: 32px; font-weight: 700; color: #c9a227;">KES 0</div>
        </div>
        <div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; padding: 24px;">
          <div style="font-size: 14px; color: #8090a0; margin-bottom: 8px;">Total Earnings</div>
          <div id="stat-earnings" style="font-size: 32px; font-weight: 700; color: #2e7d32;">KES 0</div>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #dce4f0;">
        <button onclick="showTab('products')" id="tab-products" style="padding: 12px 24px; background: #0b3b46; color: #fff; border: none; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; cursor: pointer;">Products</button>
        <button onclick="showTab('orders')" id="tab-orders" style="padding: 12px 24px; background: #f8f9fa; color: #8090a0; border: none; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; cursor: pointer;">Orders</button>
        <button onclick="showTab('commissions')" id="tab-commissions" style="padding: 12px 24px; background: #f8f9fa; color: #8090a0; border: none; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; cursor: pointer;">Commissions</button>
        <button onclick="showTab('suppliers')" id="tab-suppliers" style="padding: 12px 24px; background: #f8f9fa; color: #8090a0; border: none; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; cursor: pointer;">Suppliers</button>
      </div>

      <!-- Products Tab -->
      <div id="content-products" style="display: block;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="font-size: 20px; font-weight: 700; color: #1a2540; margin: 0;">Dropshipping Products</h2>
          <button onclick="openAddProductModal()" style="padding: 10px 20px; background: #c9a227; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;">+ Add Product</button>
        </div>
        <div id="dropship-products-container"></div>
      </div>

      <!-- Orders Tab -->
      <div id="content-orders" style="display: none;">
        <h2 style="font-size: 20px; font-weight: 700; color: #1a2540; margin: 0 0 20px;">Dropshipping Orders</h2>
        <div id="dropship-orders-container"></div>
      </div>

      <!-- Commissions Tab -->
      <div id="content-commissions" style="display: none;">
        <h2 style="font-size: 20px; font-weight: 700; color: #1a2540; margin: 0 0 20px;">Commission Tracking</h2>
        <div id="dropship-commissions-container"></div>
      </div>

      <!-- Suppliers Tab -->
      <div id="content-suppliers" style="display: none;">
        <h2 style="font-size: 20px; font-weight: 700; color: #1a2540; margin: 0 0 20px;">Supplier Directory</h2>
        <div id="dropship-suppliers-container"></div>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <!-- Add Product Modal -->
  <div id="add-product-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: #fff; border-radius: 12px; padding: 32px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <h2 style="font-size: 24px; font-weight: 700; color: #1a2540; margin: 0 0 24px;">Add Dropshipping Product</h2>
      <form id="add-dropship-product-form" onsubmit="handleAddProduct(event)">
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Product Title</label>
          <input type="text" name="title" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Description</label>
          <textarea name="description" required rows="3" style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;"></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Platform</label>
            <select name="platform" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
              <option value="Alibaba">Alibaba</option>
              <option value="AliExpress">AliExpress</option>
              <option value="DHgate">DHgate</option>
              <option value="Made-in-China">Made-in-China</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Supplier Country</label>
            <input type="text" name="supplierCountry" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Supplier Name</label>
          <input type="text" name="supplierName" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Supplier Product URL</label>
          <input type="url" name="supplierUrl" required placeholder="https://alibaba.com/product/..." style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Supplier Price (KES)</label>
            <input type="number" name="supplierPrice" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Retail Price (KES)</label>
            <input type="number" name="retailPrice" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Commission Rate (%)</label>
            <input type="number" name="commissionRate" required step="0.1" style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">MOQ</label>
            <input type="number" name="moq" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Category</label>
            <select name="category" required style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
              <option value="Furniture">Furniture</option>
              <option value="Materials">Materials</option>
              <option value="Electronics">Electronics</option>
              <option value="Textiles">Textiles</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Shipping Time</label>
            <input type="text" name="shippingTime" required placeholder="e.g., 14-21 days" style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
          </div>
        </div>
        <div style="margin-bottom: 24px;">
          <label style="display: block; font-size: 14px; font-weight: 600; color: #1a2540; margin-bottom: 8px;">Product Image URL</label>
          <input type="url" name="image" style="width: 100%; padding: 10px; border: 1.5px solid #dce4f0; border-radius: 6px; font-size: 14px;">
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
          <button type="button" onclick="closeAddProductModal()" style="padding: 10px 20px; background: #f0f0f0; color: #1a2540; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;">Cancel</button>
          <button type="submit" style="padding: 10px 20px; background: #c9a227; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;">Add Product</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function showTab(tabName) {
      // Hide all content
      document.querySelectorAll('[id^="content-"]').forEach(el => el.style.display = 'none');
      // Show selected content
      document.getElementById('content-' + tabName).style.display = 'block';
      
      // Update tab styles
      document.querySelectorAll('[id^="tab-"]').forEach(el => {
        el.style.background = '#f8f9fa';
        el.style.color = '#8090a0';
      });
      document.getElementById('tab-' + tabName).style.background = '#0b3b46';
      document.getElementById('tab-' + tabName).style.color = '#fff';

      // Load content
      if (tabName === 'products') {
        window.FurnostylesDropshipping.renderDropshipProducts('dropship-products-container');
      } else if (tabName === 'orders') {
        renderOrders();
      } else if (tabName === 'commissions') {
        renderCommissions();
      } else if (tabName === 'suppliers') {
        renderSuppliers();
      }
    }

    function openAddProductModal() {
      document.getElementById('add-product-modal').style.display = 'flex';
    }

    function closeAddProductModal() {
      document.getElementById('add-product-modal').style.display = 'none';
      document.getElementById('add-dropship-product-form').reset();
    }

    function handleAddProduct(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      
      const product = {
        title: formData.get('title'),
        description: formData.get('description'),
        platform: formData.get('platform'),
        supplierName: formData.get('supplierName'),
        supplierCountry: formData.get('supplierCountry'),
        supplierUrl: formData.get('supplierUrl'),
        supplierPrice: formData.get('supplierPrice'),
        retailPrice: formData.get('retailPrice'),
        commissionRate: formData.get('commissionRate'),
        moq: formData.get('moq'),
        category: formData.get('category'),
        shippingTime: formData.get('shippingTime'),
        image: formData.get('image')
      };

      window.FurnostylesDropshipping.addDropshipProduct(product);
      closeAddProductModal();
      window.FurnostylesDropshipping.renderDropshipProducts('dropship-products-container');
      updateStats();
    }

    function renderOrders() {
      const container = document.getElementById('dropship-orders-container');
      const orders = window.FurnostylesDropshipping.orders;
      
      if (orders.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #8090a0;">No orders yet</div>';
        return;
      }

      let html = '<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; overflow: hidden;">';
      html += '<table style="width: 100%; border-collapse: collapse;">';
      html += '<thead style="background: #f8f9fa;"><tr>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Order ID</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Product</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Amount</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Commission</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Status</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Actions</th>';
      html += '</tr></thead><tbody>';

      orders.forEach(order => {
        const statusColors = {
          'pending_payment': '#f59e0b',
          'redirected_to_supplier': '#3b82f6',
          'supplier_paid': '#8b5cf6',
          'shipped': '#06b6d4',
          'completed': '#10b981'
        };

        html += '<tr style="border-top: 1px solid #dce4f0;">';
        html += `<td style="padding: 12px; font-size: 13px;">${order.id}</td>`;
        html += `<td style="padding: 12px; font-size: 13px;">${order.productTitle}</td>`;
        html += `<td style="padding: 12px; font-size: 13px;">KES ${order.totalAmount.toLocaleString()}</td>`;
        html += `<td style="padding: 12px; font-size: 13px;">KES ${order.commissionAmount.toLocaleString()}</td>`;
        html += `<td style="padding: 12px;"><span style="background: ${statusColors[order.status] || '#8090a0'}; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;">${order.status.replace(/_/g, ' ')}</span></td>`;
        html += `<td style="padding: 12px;"><button onclick="window.FurnostylesDropshipping.routeToSupplier('${order.id}')" style="padding: 6px 12px; background: #0b3b46; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;">Route to Supplier</button></td>`;
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function renderCommissions() {
      const container = document.getElementById('dropship-commissions-container');
      const commissions = window.FurnostylesDropshipping.commissions;
      const stats = window.FurnostylesDropshipping.getCommissionStats();
      
      let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">';
      html += `<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 8px; padding: 16px;"><div style="font-size: 12px; color: #8090a0;">Total</div><div style="font-size: 20px; font-weight: 700; color: #1a2540;">KES ${stats.total.toLocaleString()}</div></div>`;
      html += `<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 8px; padding: 16px;"><div style="font-size: 12px; color: #8090a0;">Pending</div><div style="font-size: 20px; font-weight: 700; color: #f59e0b;">KES ${stats.pending.toLocaleString()}</div></div>`;
      html += `<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 8px; padding: 16px;"><div style="font-size: 12px; color: #8090a0;">Payable</div><div style="font-size: 20px; font-weight: 700; color: #8b5cf6;">KES ${stats.payable.toLocaleString()}</div></div>`;
      html += `<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 8px; padding: 16px;"><div style="font-size: 12px; color: #8090a0;">Paid</div><div style="font-size: 20px; font-weight: 700; color: #10b981;">KES ${stats.paid.toLocaleString()}</div></div>`;
      html += '</div>';

      if (commissions.length === 0) {
        html += '<div style="text-align: center; padding: 40px; color: #8090a0;">No commissions yet</div>';
        container.innerHTML = html;
        return;
      }

      html += '<div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; overflow: hidden;">';
      html += '<table style="width: 100%; border-collapse: collapse;">';
      html += '<thead style="background: #f8f9fa;"><tr>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Product</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Amount</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Rate</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Status</th>';
      html += '<th style="padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #1a2540;">Date</th>';
      html += '</tr></thead><tbody>';

      commissions.forEach(commission => {
        const statusColors = {
          'pending': '#f59e0b',
          'payable': '#8b5cf6',
          'paid': '#10b981'
        };

        html += '<tr style="border-top: 1px solid #dce4f0;">';
        html += `<td style="padding: 12px; font-size: 13px;">${commission.productTitle}</td>`;
        html += `<td style="padding: 12px; font-size: 13px;">KES ${commission.amount.toLocaleString()}</td>`;
        html += `<td style="padding: 12px; font-size: 13px;">${commission.rate}%</td>`;
        html += `<td style="padding: 12px;"><span style="background: ${statusColors[commission.status] || '#8090a0'}; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;">${commission.status}</span></td>`;
        html += `<td style="padding: 12px; font-size: 13px;">${new Date(commission.createdAt).toLocaleDateString()}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function renderSuppliers() {
      const container = document.getElementById('dropship-suppliers-container');
      const suppliers = window.FurnostylesDropshipping.suppliers;
      
      let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">';
      
      suppliers.forEach(supplier => {
        html += `
          <div style="background: #fff; border: 1.5px solid #dce4f0; border-radius: 12px; padding: 20px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
              <div style="width: 48px; height: 48px; background: #f8f9fa; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;">🏭</div>
              <div>
                <h3 style="font-size: 16px; font-weight: 700; color: #1a2540; margin: 0;">${supplier.name}</h3>
                <div style="font-size: 13px; color: #8090a0;">${supplier.country}</div>
              </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
              <div>
                <div style="font-size: 12px; color: #8090a0;">Rating</div>
                <div style="font-size: 16px; font-weight: 700; color: #1a2540;">${supplier.rating} ⭐</div>
              </div>
              <div>
                <div style="font-size: 12px; color: #8090a0;">Orders</div>
                <div style="font-size: 16px; font-weight: 700; color: #1a2540;">${supplier.totalOrders}</div>
              </div>
              <div>
                <div style="font-size: 12px; color: #8090a0;">On-Time Delivery</div>
                <div style="font-size: 16px; font-weight: 700; color: #10b981;">${supplier.onTimeDelivery}%</div>
              </div>
              <div>
                <div style="font-size: 12px; color: #8090a0;">Status</div>
                <div style="font-size: 16px; font-weight: 700; color: ${supplier.isActive ? '#10b981' : '#f59e0b'};">${supplier.isActive ? 'Active' : 'Inactive'}</div>
              </div>
            </div>
            <div style="font-size: 13px; color: #8090a0; margin-bottom: 8px;">📧 ${supplier.email}</div>
            <div style="font-size: 13px; color: #8090a0; margin-bottom: 16px;">📞 ${supplier.phone}</div>
            <button style="width: 100%; padding: 10px; background: #0b3b46; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;">View Details</button>
          </div>
        `;
      });
      
      html += '</div>';
      container.innerHTML = html;
    }

    function updateStats() {
      const products = window.FurnostylesDropshipping.getActiveDropshipProducts();
      const orders = window.FurnostylesDropshipping.orders;
      const stats = window.FurnostylesDropshipping.getCommissionStats();
      
      document.getElementById('stat-products').textContent = products.length;
      document.getElementById('stat-orders').textContent = orders.filter(o => o.status !== 'completed').length;
      document.getElementById('stat-pending').textContent = 'KES ' + stats.pending.toLocaleString();
      document.getElementById('stat-earnings').textContent = 'KES ' + stats.paid.toLocaleString();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      updateStats();
      window.FurnostylesDropshipping.renderDropshipProducts('dropship-products-container');
    });
  </script>
</body>
</html>
