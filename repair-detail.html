<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">

      <nav class="dtl-breadcrumb">
        <a href="marketplace.html">Marketplace</a> &rsaquo;

        <span id="dtlBC">Loading&hellip;</span>
      </nav>
      <div id="dtlDetail"></div>
      <div id="dtlRecs" class="dtl-recs"></div>

    </main>
  </div>

  <a class="cart-float" href="cart.html">Cart <span data-cart-count>0</span></a>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>

  <script defer src="js/main.js"></script>

  <script src="shared/uploads/upload-bridge.js"></script>

  <script defer src="shared/rendering/property-renderer.js"></script>
  <script defer src="shared/rendering/repair-renderer.js"></script>

  <script defer src="shared/details/detail-recommendations.js"></script>
  <script defer src="shared/layout/footer-data.js"></script>
  <script defer src="shared/layout/footer-render.js"></script>
  <script>
    (function () {
      'use strict';
      document.addEventListener('DOMContentLoaded', function () {
        var UI = window.FurnostylesDetailUI, DR = window.FurnostylesDetailRenderer, DRec = window.FurnostylesDetailRecommendations;
        var det = document.getElementById('dtlDetail'), recs = document.getElementById('dtlRecs');
        if (!UI || !DR) { if (det) det.innerHTML = '<div style="padding:60px;text-align:center;">Detail modules not loaded.</div>'; return; }
        UI.renderLoading(det);
        var id = UI.getParam('id');
        if (!id) { UI.renderNotFound(det, 'repair'); return; }
        var b = window.FurnostylesFirebaseBridge;
        if (!b) { UI.renderError(det, 'Firebase not available.'); return; }
        b.get('repairProjects', id)
          .then(function (item) {
            if (!item || item.status !== 'approved') { UI.renderNotFound(det, 'repair'); return; }
            document.title = (item.repairType || 'Repair Showcase') + ' | Furnostyles';
            var bc = document.getElementById('dtlBC'); if (bc) bc.textContent = item.repairType || 'Repair Showcase';
            DR.renderRepairDetail(det, item);
            if (DRec) DRec.loadForRepair(recs, item);
          })
          .catch(function (err) { UI.renderError(det, err.message); });
      });
    }());
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Session -->
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
