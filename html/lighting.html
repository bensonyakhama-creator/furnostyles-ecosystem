<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighting - Furnostyles</title>
  <meta name="description" content="Browse premium lighting at Furnostyles - chandeliers, pendant lights, lamps, and more">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
  <link rel="stylesheet" href="shared/rendering/marketplace.css">
  
  <!-- Demo Data Scripts -->
  <script src="shared/demo-data/products-demo.js"></script>
  <script src="shared/demo-data/marketplace-renderer.js"></script>
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>
  <div id="fns-topbar-mount"></div>
  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <section class="page-header">
        <h1>Lighting</h1>
        <p>Premium lighting solutions for every space</p>
      </section>

      <section class="products-section">
        <div class="products-container">
          <div class="products-filter">
            <button class="filter-btn active">All Lighting</button>
            <button class="filter-btn">Chandeliers</button>
            <button class="filter-btn">Pendant Lights</button>
            <button class="filter-btn">Table Lamps</button>
            <button class="filter-btn">Outdoor Lighting</button>
          </div>

          <div class="products-grid" id="lighting-products"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="fns-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/topbar-render.js" defer></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>
  <!-- Footer Data & Render -->
  <script defer src="shared/layout/footer-data.js"></script>
  <script defer src="shared/layout/footer-render.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.FurnostylesMarketplaceRenderer && window.FurnostylesDemoProducts) {
        window.FurnostylesMarketplaceRenderer.renderProducts(
          window.FurnostylesDemoProducts,
          'lighting-products',
          { category: 'Lighting', limit: 20 }
        );
      }
    });
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
