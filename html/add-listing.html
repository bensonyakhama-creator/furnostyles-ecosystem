<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Listing | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Add a new marketplace listing. List your furniture, materials, or services.">
  <meta name="keywords" content="add listing, marketplace listing, sell furniture, sell materials, offer services, Nairobi">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
  <link rel="canonical" href="https://furnostyles.com/add-listing.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Furnostyles">
  <meta property="og:title" content="Add Listing | Furnostyles — Personal Luxury. Elevated.">
  <meta property="og:description" content="Add a new marketplace listing. List your furniture, materials, or services.">
  <meta property="og:url" content="https://furnostyles.com/add-listing.html">
  <meta property="og:image" content="https://furnostyles.com/assets/images/hero.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Add Listing | Furnostyles — Personal Luxury. Elevated.">
  <meta name="twitter:image" content="https://furnostyles.com/assets/images/hero.jpg">
  <meta name="robots" content="noindex, nofollow">



  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <section class="content-section">
        <div class="section-header">
          <span>MARKETPLACE</span>
          <h1>Add Listing</h1>
          <p>Create a new marketplace listing.</p>
        </div>

        <div style="max-width: 600px; margin: 0 auto;">
          <form>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Listing Type</label>
              <select style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;">
                <option>Furniture</option>
                <option>Materials</option>
                <option>Services</option>
              </select>
            </div>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Title</label>
              <input type="text" placeholder="Listing title" style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;">
            </div>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Description</label>
              <textarea placeholder="Listing description" rows="4" style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;"></textarea>
            </div>
            <button type="submit" class="btn primary full-width">Create Listing</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
