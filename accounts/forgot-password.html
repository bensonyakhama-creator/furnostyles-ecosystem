<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Furnostyles — Personal Luxury. Elevated.</title>
  <meta name="description" content="Reset your Furnostyles password. Enter your email to receive a password reset link.">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="shared/layout/footer.css">
  <style>
    .auth-container {
      max-width: 480px;
      margin: 60px auto;
      padding: 40px;
      background: var(--fns-bg-light);
      border-radius: var(--fns-radius);
    }
    .auth-form-group {
      margin-bottom: 20px;
    }
    .auth-form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--fns-text-dark);
    }
    .auth-form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--fns-border);
      border-radius: var(--fns-radius);
      font-size: 15px;
    }
    .auth-form-group input:focus {
      outline: none;
      border-color: var(--fns-primary);
    }
    .auth-links {
      margin-top: 24px;
      text-align: center;
    }
    .auth-links a {
      color: var(--fns-primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 16px;
      border-radius: var(--fns-radius);
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="premium-topbar">
    <span><strong>Furnostyles</strong> Personal Luxury. Elevated.</span>
    <span><b>Kasarani, Nairobi</b> &nbsp; <b>+254 713 639 205</b> &nbsp; <b>furnostyles@gmail.com</b></span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="index.html" aria-label="Furnostyles Home">
      <span>Furnostyles</span>
    </a>
  </header>

  <div class="premium-layout">
    <main class="premium-main">
      <section class="content-section">
        <div class="section-header">
          <span>Account Recovery</span>
          <h2>Reset Password</h2>
          <p>Enter your email to receive a password reset link.</p>
        </div>

        <div class="auth-container">
          <div id="successMessage" class="success-message" style="display:none;">
            Password reset email sent. Check your inbox.
          </div>

          <form id="forgotPasswordForm">
            <div class="auth-form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <button type="submit" class="btn primary" style="width: 100%;">Send Reset Link</button>
          </form>

          <div class="auth-links">
            <a href="login.html">Back to Sign In</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Firebase Config -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-bridge.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>

  <!-- Auth System -->
  <script src="shared/auth/auth-config.js"></script>
  <script src="shared/auth/auth-state.js"></script>
  <script src="shared/auth/auth-ui.js"></script>
  <script src="shared/auth/role-router.js"></script>
  <script src="shared/auth/auth-guards.js"></script>

  <!-- Footer Render -->
  <script defer src="shared/layout/footer-data.js"></script>
  <script defer src="shared/layout/footer-render.js"></script>

  <script>
    (function () {
      'use strict';

      var forgotPasswordForm = document.getElementById('forgotPasswordForm');
      var successMessage = document.getElementById('successMessage');

      /* Handle forgot password form submission */
      forgotPasswordForm.addEventListener('submit', function (e) {
        e.preventDefault();

        if (!window.FurnostylesAuthService) {
          window.FurnostylesAuthUI.showFormError(forgotPasswordForm, 'Auth service not available. Please check Firebase configuration.');
          return;
        }

        var email = document.getElementById('email').value;

        window.FurnostylesAuthUI.clearFormErrors(forgotPasswordForm);
        window.FurnostylesAuthUI.setLoading(forgotPasswordForm, true);

        window.FurnostylesAuthService.sendPasswordResetEmail(email)
          .then(function () {
            window.FurnostylesAuthUI.setLoading(forgotPasswordForm, false);
            forgotPasswordForm.style.display = 'none';
            successMessage.style.display = 'block';
          })
          .catch(function (error) {
            window.FurnostylesAuthUI.setLoading(forgotPasswordForm, false);
            var message = 'Failed to send reset email. Please try again.';
            if (error.code === 'auth/user-not-found') {
              message = 'No account found with this email.';
            } else if (error.code === 'auth/invalid-email') {
              message = 'Invalid email address.';
            }
            window.FurnostylesAuthUI.showFormError(forgotPasswordForm, message);
          });
      });

    }());
  </script>
</body>
</html>
