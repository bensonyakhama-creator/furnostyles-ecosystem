<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | Furnostyles</title>
  <meta name="description" content="View and track your orders on Furnostyles marketplace.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../shared/layout/footer.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
    <section class="section-header">
      <span>Account</span>
      <h1>My Orders</h1>
      <p>View and track your orders</p>
    </section>

    <div class="premium-content">
      <div class="empty-state">
        <div class="empty-icon">??</div>
        <h2>No Orders Yet</h2>
        <p>You haven't placed any orders yet. Start shopping to see your orders here.</p>
        <a href="../marketplace.html" class="btn primary">Start Shopping</a>
      </div>
    </div>
  </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>

  <script src="../shared/layout/footer-render.js"></script>
  <script src="../assets/js/app.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
