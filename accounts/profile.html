<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Furnostyles</title>
  <meta name="description" content="Manage your profile settings on Furnostyles.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../shared/layout/footer.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
    <section class="section-header">
      <span>Account</span>
      <h1>My Profile</h1>
      <p>Manage your account settings</p>
    </section>

    <div class="premium-content">
      <div class="profile-section">
        <h2>Profile Information</h2>
        <form class="profile-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Enter your location">
          </div>
          <button type="submit" class="btn primary">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>

  <script src="../shared/layout/footer-render.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
