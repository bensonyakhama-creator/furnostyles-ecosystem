<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Furnostyles</title>
  <meta name="description" content="Manage your profile settings on Furnostyles.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../shared/layout/footer.css">
</head>
<body>

  <div class="premium-topbar">
    <div class="fld-brand-section">
      <span class="fld-brand-name">Furnostyles Luxe Designs</span>
      <span class="fld-tagline">Personal Luxury. Elevated.</span>
    </div>
    <div class="fld-location-dropdown" role="button" aria-label="Delivery areas" aria-haspopup="true" aria-expanded="false" tabindex="0">
      <svg class="fld-location-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/>
      </svg>
      <span>Delivery to all major towns in Kenya and beyond.</span>
    </div>
    <span class="fld-contact-info">
      <a href="tel:+254713639205" class="fld-contact-link" aria-label="Call us at +254 713 639 205">+254 713 639 205</a>
      <span class="fld-contact-separator">|</span>
      <a href="mailto:furnostyles@gmail.com" class="fld-contact-link" aria-label="Email us at furnostyles@gmail.com">furnostyles@gmail.com</a>
    </span>
  </div>

  <header class="premium-header">
    <a class="premium-brand" href="../index.html" aria-label="Furnostyles Home">
      <span>Furnostyles</span>
    </a>
    <nav class="premium-nav" aria-label="Main navigation">
      <a href="../index.html">Home</a>
      <a href="../marketplace.html">Marketplace</a>
      <a href="../services.html">Services</a>
      <a href="../portfolio.html">Portfolio</a>
      <a href="../contact.html">Contact</a>
    </nav>
  </header>

  <main class="premium-main">
    <section class="section-header">
      <span>Account</span>
      <h1>My Profile</h1>
      <p>Manage your account settings</p>
    </section>

    <div class="premium-content">
      <div class="profile-section">
        <h2>Profile Information</h2>
        <form class="profile-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Enter your location">
          </div>
          <button type="submit" class="btn primary">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../shared/layout/footer-render.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
