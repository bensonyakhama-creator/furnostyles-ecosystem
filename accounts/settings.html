<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Furnostyles</title>
  <meta name="description" content="Manage your account settings on Furnostyles.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../shared/layout/footer.css">
  
  <link rel="stylesheet" href="assets/css/site-fix.css"></head>
<body>

  <div id="fns-header-mount"></div>

  <main class="premium-main">
    <section class="section-header">
      <span>Account</span>
      <h1>Settings</h1>
      <p>Manage your account preferences</p>
    </section>

    <div class="premium-content">
      <div class="settings-section">
        <h2>Notification Settings</h2>
        <form class="settings-form">
          <div class="form-group">
            <label>
              <input type="checkbox" name="emailNotifications" checked>
              Email Notifications
            </label>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" name="smsNotifications">
              SMS Notifications
            </label>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" name="orderUpdates" checked>
              Order Updates
            </label>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" name="promotionalEmails">
              Promotional Emails
            </label>
          </div>
          <button type="submit" class="btn primary">Save Settings</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Header Data & Render -->
  <script src="../shared/layout/header-data.js"></script>
  <script src="../shared/layout/header-render.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script></main>

  <script src="../shared/layout/footer-render.js"></script>
  <script src="../assets/js/app.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Config & Init -->
  <script src="shared/firebase/firebase-config.js"></script>
  <script src="shared/firebase/firebase-init.js"></script>
  <!-- Firebase Bridge -->
  <script src="shared/firebase/firebase-bridge.js" defer></script>
  <!-- Auth, Firestore, Session -->
  <script src="assets/js/firestore.js" defer></script>
  <script src="assets/js/session.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <!-- Auth State Manager -->
  <script src="assets/js/auth-state.js" defer></script>
</body>
</html>
