<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Account | Furnostyles — Vendor Registration</title>
  <meta name="description" content="Provider account registration with Furnostyles — become a service provider, vendor, or artisan in the Furnostyles ecosystem.">
  <meta name="keywords" content="provider account, vendor registration, service provider, artisan registration, Nairobi">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
  <link rel="stylesheet" href="../shared/layout/footer.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main">
      <section class="content-section">
        <div class="section-header">
          <span>PROVIDER REGISTRATION</span>
          <h1>Provider Account</h1>
          <p>Register as a service provider, vendor, or artisan in the Furnostyles ecosystem.</p>
        </div>

        <div style="max-width: 600px; margin: 0 auto;">
          <form>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Provider Type</label>
              <select style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;">
                <option>Service Provider</option>
                <option>Vendor</option>
                <option>Artisan</option>
                <option>Contractor</option>
              </select>
            </div>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Business Name</label>
              <input type="text" placeholder="Your business name" style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;">
            </div>
            <div style="margin-bottom: 16px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold;">Services Offered</label>
              <textarea placeholder="Describe your services" rows="4" style="width: 100%; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px;"></textarea>
            </div>
            <button type="submit" class="btn primary full-width">Register Provider</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div id="fld-footer-mount"></div>

  <!-- Header Data & Render -->
  <script src="shared/layout/header-data.js"></script>
  <script src="shared/layout/header-render.js" defer></script>
  <script src="assets/js/layout-loader.js" defer></script>
  <script src="../shared/firebase/firebase-config.js"></script>
  <script src="../shared/firebase/firebase-bridge.js" defer></script>
  <script src="../assets/js/app.js" defer></script>
  <script src="../assets/js/layout-loader.js" defer></script>
</body>
</html>
