<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Furnostyles</title>
  <meta name="description" content="Reset your Furnostyles account password securely.">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

  <div id="fns-header-mount"></div>

  <div class="premium-layout">
    <main class="premium-main" style="max-width: 500px; margin: 0 auto; padding: 60px 24px;">
      
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 32px; font-weight: 800; color: var(--fns-petrol-blue); margin-bottom: 16px;">Reset Your Password</h1>
        <p style="font-size: 16px; color: var(--fns-text-light); line-height: 1.6;">Enter your new password below to complete the password reset process.</p>
      </div>

      <form style="background: #fff; padding: 40px; border-radius: 16px; border: 1.5px solid #dce4f0; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
        
        <div style="margin-bottom: 24px;">
          <label for="newPassword" style="display: block; font-size: 14px; font-weight: 600; color: var(--fns-petrol-blue); margin-bottom: 8px;">New Password</label>
          <input type="password" id="newPassword" name="newPassword" required placeholder="Enter your new password" style="width: 100%; padding: 14px 16px; border: 1.5px solid #dce4f0; border-radius: 8px; font-size: 15px; transition: border-color 0.18s;">
        </div>

        <div style="margin-bottom: 24px;">
          <label for="confirmPassword" style="display: block; font-size: 14px; font-weight: 600; color: var(--fns-petrol-blue); margin-bottom: 8px;">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your new password" style="width: 100%; padding: 14px 16px; border: 1.5px solid #dce4f0; border-radius: 8px; font-size: 15px; transition: border-color 0.18s;">
        </div>

        <button type="submit" style="width: 100%; background: linear-gradient(135deg, var(--fns-gold-primary), #d4a84b); color: var(--fns-petrol-blue); padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);">Reset Password</button>
      </form>

      <div style="text-align: center; margin-top: 32px;">
        <p style="font-size: 14px; color: var(--fns-text-light);">Remember your password? <a href="login.html" style="color: var(--fns-gold-primary); font-weight: 600; text-decoration: none;">Sign In</a></p>
      </div>

      <div style="text-align: center; margin-top: 24px; padding: 24px; background: rgba(11, 59, 70, 0.05); border-radius: 12px; border: 1.5px solid rgba(212, 175, 55, 0.1);">
        <h3 style="font-size: 16px; font-weight: 700; color: var(--fns-gold-primary); margin-bottom: 12px;">Need Help?</h3>
        <p style="font-size: 14px; color: var(--fns-text-light); margin-bottom: 16px;">Contact our support team for assistance with your account.</p>
        <a href="https://wa.me/254713639205" target="_blank" style="display: inline-block; background: #25d366; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none;">WhatsApp Support</a>
      </div>

    </main>
  </div>

  <script>
    // Form validation
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      var newPassword = document.getElementById('newPassword').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword !== confirmPassword) {
        alert('Passwords do not match. Please try again.');
        return;
      }
      
      if (newPassword.length < 8) {
        alert('Password must be at least 8 characters long.');
        return;
      }
      
      // In production, this would send to backend
      alert('Password reset successful! You can now sign in with your new password.');
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
