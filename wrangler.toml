# Cloudflare Pages Configuration for FURNOSTYLES
# This file configures Cloudflare Pages deployment settings

name = "furnostyles-ecosystem"
compatibility_date = "2024-01-01"

# Build configuration
[build]
command = ""
cwd = "."
watch_dir = "."

# Environment variables (optional - for build-time)
[vars]
ENVIRONMENT = "production"

# Redirect rules (if needed)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Headers for security and caching
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

# Cache headers for static assets
[[headers]]
for = "*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.svg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.woff"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
